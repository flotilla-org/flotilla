rounds:
- interactions:
  - channel: command
    cmd: git
    args:
    - config
    - '--get-regexp'
    - ^branch\..*\.flotilla\.issues\.
    cwd: '{repo}'
    stderr: ''
    exit_code: 1
  - channel: command
    cmd: git
    args:
    - fetch
    - origin
    - feature/remote-only
    cwd: '{repo}'
    stdout: ''
    exit_code: 0
  - channel: command
    cmd: git
    args:
    - log
    - '-1'
    - "--format=%h\t%s"
    cwd: '{repo}.feature-remote-only'
    stdout: "8d63943\tremote-only work\n"
    exit_code: 0
  - channel: command
    cmd: git
    args:
    - show-ref
    - '--verify'
    - '--quiet'
    - refs/heads/feature/remote-only
    cwd: '{repo}'
    stderr: ''
    exit_code: 1
  - channel: command
    cmd: git
    args:
    - show-ref
    - '--verify'
    - '--quiet'
    - refs/heads/main
    cwd: '{repo}'
    stdout: ''
    exit_code: 0
  - channel: command
    cmd: git
    args:
    - show-ref
    - '--verify'
    - '--quiet'
    - refs/remotes/origin/feature/remote-only
    cwd: '{repo}'
    stdout: ''
    exit_code: 0
  - channel: command
    cmd: git
    args:
    - status
    - '--porcelain'
    cwd: '{repo}.feature-remote-only'
    stdout: ''
    exit_code: 0
  - channel: command
    cmd: git
    args:
    - symbolic-ref
    - refs/remotes/origin/HEAD
    - '--short'
    cwd: '{repo}'
    stderr: |
      fatal: ref refs/remotes/origin/HEAD is not a symbolic ref
    exit_code: 1
  - channel: command
    cmd: git
    args:
    - worktree
    - add
    - '-b'
    - feature/remote-only
    - '{repo}.feature-remote-only'
    - origin/feature/remote-only
    cwd: '{repo}'
    stdout: |
      branch 'feature/remote-only' set up to track 'origin/feature/remote-only'.
      HEAD is now at 8d63943 remote-only work
    exit_code: 0
  - channel: command
    label: remote-ab
    cmd: git
    args:
    - rev-list
    - '--left-right'
    - '--count'
    - HEAD...origin/feature/remote-only
    cwd: '{repo}.feature-remote-only'
    stdout: "0\t0\n"
    exit_code: 0
  - channel: command
    label: trunk-ab
    cmd: git
    args:
    - rev-list
    - '--left-right'
    - '--count'
    - HEAD...main
    cwd: '{repo}.feature-remote-only'
    stdout: "1\t0\n"
    exit_code: 0
  - channel: command
    label: verify-commit
    cmd: git
    args:
    - log
    - '-1'
    - '--format=%s'
    cwd: '{repo}.feature-remote-only'
    stdout: |
      remote-only work
    exit_code: 0
