\n\n## What to build\n- `/` ephemeral fuzzy filter over the visible rows of any table (per-View state from #733, discarded on Esc).\n- Structured scope refinement (host, project, phase-class) that lives in the query scope and therefore the tab address — narrowing is an address change, shareable and restorable.\n\n## Acceptance criteria\n- [ ] `/` filters any table without touching subscriptions; Esc clears\n- [ ] Structured narrowing round-trips through the tab address (close/reopen restores it)\n- [ ] Works uniformly across all four families\n\n## Blocked by\n- #735 (scoped tabs)","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/736/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/736/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/735","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/735/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/735/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/735/events","html_url":"https://github.com/flotilla-org/flotilla/issues/735","id":4882311723,"node_id":"I_kwDORel_088AAAABIwIqKw","number":735,"title":"Tables v1 slice 3: scoped tabs — checkouts + demand-backed issues tables","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10393671168,"node_id":"LA_kwDORel_088AAAACa4LWAA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/ui","name":"ui","color":"C5DEF5","default":false,"description":"UI/UX and rendering"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-14T10:47:12Z","updated_at":"2026-07-14T10:47:27Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#666 (umbrella) · ADR 0014 (scoped families, demand-backed materialization).\n\n## What to build\nScope arrives in the view layer:\n\n- Scope params flow ViewAddress (`?key=value`, ADR 0013) → SubscribeQueries, for all four families.\n- **Checkouts table** over `checkouts{scope}` (#730): worktrees/clones with host + authority columns.\n- **Issues table** over `issues{scope}` (#729, demand-backed): render `as_of` staleness and `has_more`; fetch-more intent on scroll-near-bottom / explicit key; search beyond the window via the ephemeral search query. Issue rows carry the start-convoy action submitting intent to #732''s verb (with the project''s default workflow).\n\n## Acceptance criteria\n- [ ] A repo-scoped issues tab shows the open-issues window with honest `as_of`; fetch-more extends it without resubscribe\n- [ ] Starting a convoy from an issue row lands attached in the crew session (#732 path)\n- [ ] Checkouts tab truthful across hosts\n- [ ] Scope lives in the tab address; reopening the address restores the scoped tab (no duplication)\n\n## Blocked by\n- #733 (foundation) · #729 (issues family + parameterized QueryId) · #730 (checkouts family) · #732 (soft — the row action degrades to absent while the verb is unbuilt, per capability-guarding)","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/735/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/735/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/730","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/730/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/730/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/730/events","html_url":"https://github.com/flotilla-org/flotilla/issues/730","id":4882126532,"node_id":"I_kwDORel_088AAAABIv9WxA","number":730,"title":"checkouts{scope} curated query over observed Checkout resources","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.c