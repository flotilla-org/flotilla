"description":"related to provider infra or implementation."}],"state":"closed","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-14T18:40:38Z","updated_at":"2026-07-15T12:51:48Z","closed_at":"2026-07-15T12:51:48Z","assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\nExtracted from #729 (its stage 5) to break the #732 → #729 serialization. Both consume this; neither needs the other.\n\n## What to build\n\nThe shared issue-data substrate both #729 and #732 sit on, per the rulings already recorded on those issues:\n\n- **`IssueRef { source, id }`** in protocol — source-qualified, opaque id (ADR 0014 as amended: GitHub `728` and Linear `WIDGET-123` are both opaque; two repos'' issues must never collide in a Project union).\n- **Grown normalized `Issue` shape**: body, state, `as_of` in addition to today''s title/labels (today''s shape has none of these — verified). #732''s Brief snapshot and #729''s window rows both need it.\n- **Source-addressed fetch seam**: provider calls take an external source identity (Forge / Project Issue Source per ADR 0014 glossary), with host-local provider/credential selection behind the seam — never a checkout path (cloud-only Projects have no checkout). Converge the two existing issue interfaces (`IssueProvider` / `IssueQueryService`) onto it rather than adding a third; Plane-A implementations remain the fetch layer, rebound.\n- **Verbs**: fetch-by-id first (unblocks #732''s admission snapshot); paged list / search / changed-since rebound to the seam behind it (consumed by #729''s materializer).\n- Project → Issue Source resolution (single override, else constituent Repositories'' Forges; unresolvable = unavailable, never empty — ADR 0014 as amended).\n\n## Acceptance\n- [ ] Fetch an issue by opaque id from a source identity with no checkout on the host\n- [ ] `IssueRef` + grown `Issue` defined once in protocol; no second definition in #729/#732\n- [ ] Existing issue interfaces converged; GitHub adapter passes existing behavior through the new seam (replay fixtures re-recorded, not hand-edited)\n- [ ] Project issue-source resolution surfaces \"unavailable\" as a typed outcome\n\n## Blocked by\nNone — can start immediately. Unblocks #732 (admission snapshot + Brief) and #729''s materializer stage; #729''s delta/registry stages (1–4) proceed in parallel regardless.","closed_by":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/747/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/fl