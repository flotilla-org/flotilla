    body: '[{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/756","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/756/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/756/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/756/events","html_url":"https://github.com/flotilla-org/flotilla/pull/756","id":4893459411,"node_id":"PR_kwDORel_087yEeKs","number":756,"title":"Support multi-repository vessel workspaces","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-15T14:32:07Z","updated_at":"2026-07-15T14:32:07Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":null,"active_lock_reason":null,"draft":true,"pull_request":{"url":"https://api.github.com/repos/flotilla-org/flotilla/pulls/756","html_url":"https://github.com/flotilla-org/flotilla/pull/756","diff_url":"https://github.com/flotilla-org/flotilla/pull/756.diff","patch_url":"https://github.com/flotilla-org/flotilla/pull/756.patch","merged_at":null},"body":"## What changed\n\n- snapshot every project repository into a convoy with its canonical repository key, resolved base branch, stable workspace slug, and selected subpaths\n- provision one checkout per relevant repository while sharing a single vessel workspace root across host-direct and Docker placements\n- allow workflow vessels to narrow their repository scope and track checkout status per repository\n- create and preserve the convoy branch across worktrees and fresh clones, including stale local clones and existing remote branches\n- retain repository-less scratch convoy compatibility and repository-scoped adopted checkout behavior\n- update resource schemas, CRDs, projections, and regression coverage\n\n## Why\n\nProjects can span multiple repositories, but vessel provisioning previously assumed a single checkout. This made project-level workflows unable to present a coherent workspace or safely coordinate one convoy branch across all selected repositories.\n\n## Impact\n\nA vessel can now work from a shared root containing deterministic per-repository directories. Docker mounts the shared root once, host-direct agents receive briefs relative to that root, and single-repository behavior remains unchanged.\n\n## Validation\n\n- `cargo +nightly-2026-03-12 fmt --check`\n- `cargo clippy --workspace --all-targets --locked -- -D warnings`\n- `cargo test --workspace --locked --features flotilla-daemon/skip-no-sandbox-tests`\n- `cargo test -p flotilla-core --locked --features test-support --test in_process_daemon`\n\nCloses #746","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/756/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/756/timeline","pe