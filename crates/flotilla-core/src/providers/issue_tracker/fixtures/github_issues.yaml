the M1 user-story grill (2026-07-14) → ADR 0014 (PR #727).\n\n## What to build\nA store-backed curated query family `checkouts{scope}` projecting the observed Checkout resources (#674): which worktrees/clones exist, where, on which host — the bread-and-butter of the current repo view, needed by the project tab (repo-view successor). Typed `CheckoutRow` (resource ref, repo key, path, branch, host, authority), same ResultSet/delta contract as `convoys`. Scope params per ADR 0014 (repo key / project ref).\n\n## Acceptance criteria\n- [ ] `checkouts{repo}` subscription delivers rows for observed checkouts and deltas as they appear/vanish\n- [ ] Rows carry origin host and lifecycle authority\n- [ ] Same contract tests as the existing convoys/sessions queries\n\n## Blocked by\n- #729 (parameterized QueryId lands there; the projection itself is independent)","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/730/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/730/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/725","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/725/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/725/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/725/events","html_url":"https://github.com/flotilla-org/flotilla/issues/725","id":4878659575,"node_id":"I_kwDORel_088AAAABIspv9w","number":725,"title":"Record native Zellij list-panes schema coverage","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10347495064,"node_id":"LA_kwDORel_088AAAACaMI-mA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/from-review","name":"from-review","color":"BFD4F2","default":false,"description":"Issue filed from PR review feedback"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-14T00:01:28Z","updated_at":"2026-07-14T00:01:28Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":null,"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"From PR #724 review by @claude[bot]: https://github.com/flotilla-org/flotilla/pull/724#issuecomment-4964016229\n\nAdd a real `REPLAY=record` provider test that exercises the multi-pane Zellij workspace path where the initial pane must be restored. The recording should capture `zellij action list-panes --json --all` from the supported native Andamento Zellij fork and lock the `tab_id`, `is_plugin`, `is_focused`, and `id` schema used by `initial_terminal_pane_id`.\n\nPR #724 already has deterministic unit coverage using JSON captured from the native fork and was live-validated, so this is additional contract coverage rather than a blocker for the race fix.\n","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/725/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/725/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/708","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/708/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/708/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/708/events","html_url":"https://github.com/flotilla-org/flotilla/issues/708","id":4877271730,"node_id":"I_kwDORel_088AAAABIrVCsg","number":708,"title":"Build the manifest metadata-patch connector v0 (flotilla pm connect + attach pane stamping)","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10363475967,"node_id":"LA_kwDORel_088AAAACabYX_w","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/integration","name":"integration","color":"0E8A16","default":false,"description":"New provider or tool integration"},{"id":10420764475,"node_id":"LA_kwDORel_088AAAACbSA_Ow","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/protocol","name":"protocol","color":"D4A017","default":false,"description":"Wire protocol, message format, handshake"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-07-13T20:16:26Z","updated_at":"2026-07-13T23:06:15Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n\n#604 · Design: #667 (grilled 2026-07-11, currency-checked 2026-07-13 — design doc: `project-map/reports/manifest-connector-design-2026-07-11.html`). All prerequisites landed (#680, #682, #683, gate #672); worktree `manifest-metadata-patch-connector` exists on current main.\n\n## What to build\n\nThe manifest metadata-patch connector v0, per the #667 design:\n\n- **Half 1 — attach-time pane stamping:** `flotilla attach`, when running inside a PM, publishes pane → identity (`flotilla.session` = `<host>/<ns>/<session>` canonical join key + denormalized ids, no TTL) into the PM''s metadata plane before exec.\n- **Half 2 — the catalog:** `flotilla pm connect`, one per PM instance, PM-adjacent (never a flotillad facility). Dials the local daemon as a client, subscribes (`SubscribeQueries`) to the `convoys` and `sessions` named queries, and projects the fleet-merged rows into Group/Identity-targeted metadata patches: project → convoy → vessel hierarchy, latent entities included, phase/attention badges, recipes. TTL ≈30s, re-asserted ≈10s.\n\nv0 binds to andamento''s **current** pipe names and key spellings (`andamento-apply-metadata-patch`, `tab.*`, `git.repo`) — deliberate deviation from bind-after-Leg-1, recorded on #667. All spellings live in one wire module so the Leg-1 rename is one file.\n\n## Dependency direction (decided 2026-07-13)\n\nThe wire module **mirrors** `andamento-shared`''s patch serde for v0 (`MetadataPatch`/`MetadataTarget`/`MetadataValueUpdate`), verified by fixture round-trip tests against andamento''s actual JSON. This mirror is a stopgap, not the architecture:\n\n- **End state:** andamento, wheelhouse/uishell, **and flotilla** all depend on the shared `flotilla-org/manifest` crate once the manifest extraction convoy''s Leg 1 creates it. PM cores must not depend on flotilla; flotilla depending on a PM''s crate (`andamento-shared`) is even more backwards. The shared crate holds the non-flotilla-specific things: patch types, targets, store/resolver semantics, transport adapters.\n- **Stays in flotilla:** everything stringly flotilla-specific — the `flotilla.*` key spellings, the projection from result-set rows, recipe templates. These depend on flotilla metadata by construction and belong here.\n- At Leg 1, flotilla''s wire module shrinks to spellings + send-function selection, and the mirrored types are deleted in favour of the manifest crate dependency.\n\n## Slices\n\n1. **`manifest` wire module** — mirrored patch types matching andamento JSON exactly, pipe-name constants, send functions (zellij CLI pipe + unix socket), fixture round-trip tests against `andamento-shared` serde. Address minting behind a pluggable formatter: v0 recipes are `flotilla attach <ref>` only; `flotilla view <address>` (ADR 0013 addresses) plugs in when the #589 branch lands.\n2. **Projection library** — pure `ResultSet → Vec<MetadataPatch>`, fixture-tested (rows in, patches out): GroupPath spine (project_ref, repo fallback, archipelago ordinal), latent derivation rules, badge normalization (`status.state` ∈ idle/waiting/active/done/failed + `status.attention`), `factory.id` dedupe, explicit unsets on resource disappearance.\n3. **`flotilla pm connect`** — subscribe → project → send loop; PM detection from env (`ZELLIJ` ⇒ pipes; wheelhouse socket path ⇒ unix socket); TTL re-assertion cadence; gap ⇒ resubscribe with cursors; relist-on-desync. Protocol v8 handshake equality means the connector binary rides the daemon''s upgrade cadence.\n4. **Attach stamping** — protocol change: `AttachCommandResolved` returns the structured binding (session name, namespace, host, labels), not just a command string (no-compat, free to reshape). CLI stamps one Pane-target patch before exec. Staleness-until-pane-reuse accepted for v0. Shared stamp implementation with ADR 0012''s in-PM table attach.\n5. **Actuator workspace stamping** — tab-id two-step on flotilla-created zellij tabs (create → capture tab id → `Tab(id)` patch, the git-watcher factory pattern).\n\n## Acceptance (daily driver, spec §6 v1 bar)\n\n- [ ] zellij sidebar lists live + latent convoys/vessels from the catalog, cross-host through the local socket\n- [ ] phase/attention badges truthful — a failed convoy shows failed + its message, never masked\n- [ ] clicking a vessel with a running session attaches (recipe execution by the PM; connector not in the click path)\n- [ ] pane identity survives pool indirection and cross-host attach — the cwd derivation is dead by construction\n- [ ] daemon dies ⇒ catalog facts TTL out; pane stamps survive; daemon returns ⇒ re-list and re-assert; connector restarts idempotent\n\n## Non-goals\n\n- No `flotilla.leg.*` keys — reserved, never published\n- Rail-side latent rendering (andamento''s half of the v1 bar)\n- Presentation actuation in the connector seat (recorded direction, not v0)\n- Any flotilla dependency in manifest/andamento — the git-watcher stays the independence proof\n","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/708/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/708/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/658","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/658/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/658/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/658/events","html_url":"https://github.com/flotilla-org/flotilla/issues/658","id":4839251916,"node_id":"I_kwDORel_088AAAABIHEfzA","number":658,"title":"Inter-crew workflow: bounce triggers, done-authority, artifact sync fabric","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10429583487,"node_id":"LA_kwDORel_088AAAACbabQfw","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/provider","name":"provider","color":"411f2f","default":false,"description":"related to provider infra or implementation."}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-07-08T16:19:11Z","updated_at":"2026-07-13T19:06:23Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32035970,"node_id":"IT_kwDOEBMoCM4B6NSC","name":"Brainstorm","description":"Needs brainstorming","color":"purple","created_at":"2026-03-20T23:03:42Z","updated_at":"2026-03-20T23:03:42Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#604 · ADR 0010 ''Parked'' · adjacent to #624\n\n(Parked Brainstorm.) The coder↔reviewer bounce and its generalisation. In-vessel and cross-vessel routing are the **same semantics with different transfer costs** — not two mechanisms. To design when real convoy practice (ADR 0008 harvest) forces it:\n\n1. **Bounce triggers** — local crew autonomy vs Bosun-always-involved.\n2. **Done-authority** — does exactly one crew member hold the capability to mark the wider task complete? (If ''only the Bosun'', completion authority becomes a PersistentAgent concern — flagged in ADR 0010.)\n3. **Artifact sync fabric** — code flows via commit/push; non-code artifacts (demo images, videos) need a decided fabric: crews *mark* artifacts with happens-after push↔pull/transfer, or always-write-to-a-shared-space (object storage). Ties to ADR 0006 External Results (referenced, not modeled).\n\n## Blocked by\nHarvest from real convoy practice; not blocking Daily-driver v1.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/658/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/658/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/625","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/625/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/625/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/625/events","html_url":"https://github.com/flotilla-org/flotilla/issues/625","id":4711892182,"node_id":"I_kwDORel_088AAAABGNnE1g","number":625,"title":"Host / environment / location model","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10420764394,"node_id":"LA_kwDORel_088AAAACbSA-6g","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/multi-host","name":"multi-host","color":"7B68EE","default":false,"description":"Multi-host peering and networking"},{"id":10429583487,"node_id":"LA_kwDORel_088AAAACbabQfw","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/provider","name":"provider","color":"411f2f","default":false,"description":"related to provider infra or implementation."}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-06-21T20:39:07Z","updated_at":"2026-07-13T19:03:56Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32035970,"node_id":"IT_kwDOEBMoCM4B6NSC","name":"Brainstorm","description":"Needs brainstorming","color":"purple","created_at":"2026-03-20T23:03:42Z","updated_at":"2026-03-20T23:03:42Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#604\n\n## What to build\n(Parked design / Brainstorm.) Pin down the Host ↔ Environment relationship. Most resources live *in* an Environment. A Host is/has a direct environment and may contain nested ones (docker, sandbox-exec, firecracker); a service-provided Environment (runpod, modal, aws) may itself be an ephemeral Host. Reachability (Tender-local vs external-service API) is orthogonal to the resource/reference cut (ADR 0006) and needs a coherent model.\n\n## Acceptance criteria\n- [ ] (stub) A model for Host vs Environment, nesting, and how location/reachability is represented on resources\n\n## Blocked by\nParked — informs provisioning + federation work.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/625/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/625/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/655","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/655/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/655/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/655/events","html_url":"https://github.com/flotilla-org/flotilla/issues/655","id":4832147490,"node_id":"I_kwDORel_088AAAABIAS4Ig","number":655,"title":"Attach UX across presentation environments (ghostty tabs / uishell / zellij)","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10393671168,"node_id":"LA_kwDORel_088AAAACa4LWAA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/ui","name":"ui","color":"C5DEF5","default":false,"description":"UI/UX and rendering"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-07-07T20:52:37Z","updated_at":"2026-07-13T18:15:30Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32035970,"node_id":"IT_kwDOEBMoCM4B6NSC","name":"Brainstorm","description":"Needs brainstorming","color":"purple","created_at":"2026-03-20T23:03:42Z","updated_at":"2026-03-20T23:03:42Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#604 · presentation territory (phase 6, #610)\n\n(Parked Brainstorm — grill when further along.) `flotilla attach` behaviour plausibly differs by presentation environment:\n\n- **Plain terminal / basic PM (ghostty):** multiple crew targeted → open a tab per crew; multiple vessels → choice.\n- **Integrated (uishell; zellij + andamento):** first-class attach — a convoy tab with a tree of vessel tabs added to the sidebar.\n\nWorking position (guards #654''s scope): **`attach` itself stays ''attach exactly one thing into my current terminal''**, with simple menus for disambiguation. The richer environment-aware flows are presentation-manager behaviours — likely *different commands/verbs*, driven by Presentation resources / Yeoman — not extensions of `attach`.\n\nGrill later: verb taxonomy (attach vs open vs present?), how a PM advertises its capabilities, how convoy→tab-tree mapping is expressed (Presentation resource? PresentationPolicy dual per the presentation-direction notes).","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/655/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/655/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/633","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/633/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/633/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/633/events","html_url":"https://github.com/flotilla-org/flotilla/issues/633","id":4810973027,"node_id":"I_kwDORel_088AAAABHsGfYw","number":633,"title":"M1: dogfood pass — real workloads, lid-close/reattach acceptance","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/