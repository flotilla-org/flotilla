    body: '[{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/749","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/749/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/749/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/749/events","html_url":"https://github.com/flotilla-org/flotilla/issues/749","id":4887532706,"node_id":"I_kwDORel_088AAAABI1HUog","number":749,"title":"Document or enforce terminal-input invariants for one-shot work patches","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10347495064,"node_id":"LA_kwDORel_088AAAACaMI-mA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/from-review","name":"from-review","color":"BFD4F2","default":false,"description":"Issue filed from PR review feedback"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-14T22:32:21Z","updated_at":"2026-07-14T22:32:21Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":null,"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"From PR #745 review by @claude[bot]: https://github.com/flotilla-org/flotilla/pull/745#issuecomment-4974602234\n\nSeveral ConvoyStatusPatch transitions rely on caller-side guards to ensure work is non-terminal before writing a sticky finished_at value: FailConvoy cancelled_work, ForceWorkCompleted, MarkWorkFailed, and MarkWorkCancelled.\n\nAudit whether these invariants should be enforced in the patch implementation, represented in the lifecycle contract, or documented next to both the patch and legal callers. The goal is to prevent future callers from accidentally treating a changed terminal outcome as a duplicate while preserving the existing legal transition model.\n\nContext: PR #745 deliberately leaves these one-shot transitions duplicate-only because current callers reject terminal input.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/749/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/749/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/748","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/748/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/748/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/748/events","html_url":"https://github.com/flotilla-org/flotilla/issues/748","id":4886155217,"node_id":"I_kwDORel_088AAAABIzzP0Q","number":748,"title":"Object storage for briefs, artifacts, recordings: fleet store + local fallback","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10420764394,"node_id":"LA_kwDORel_088AAAACbSA-6g","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/multi-host","name":"multi-host","color":"7B68EE","default":false,"description":"Multi-host peering and networking"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-14T18:58:13Z","updated_at":"2026-07-14T18:58:13Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32035970,"node_id":"IT_kwDOEBMoCM4B6NSC","name":"Brainstorm","description":"Needs brainstorming","color":"purple","created_at":"2026-03-20T23:03:42Z","updated_at":"2026-03-20T23:03:42Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Question\n\nFlotilla needs somewhere durable to put **things that are not resources and should not be forced into repos**: Briefs (currently the plan is stamping them into checkouts purely because the repo is the only durable store we have — #746''s open question), produced artifacts (demo videos, built binaries, reports), and eventually crew transcripts / cleat recordings (the enrichment ADR 0016''s death-inventory story explicitly deferred). Infra context: RustFS (S3-compatible) is being set up on the proxmoxes by an infra agent; some environments (single laptop) need a local thing instead.\n\nMethod ruling (standing): scenario-first — write expectations, then the model.\n\n## Seed scenarios\n\n1. **Brief at admission.** Convoy created from an issue; the Brief is the script-as-executed and must survive vessel teardown and host death *without* polluting the repo. Re-provisioning on another host fetches it. What does admission write, where, and what lands on `ConvoySpec`?\n2. **Artifact produced by a crew.** A vessel produces a demo video. It should attach to the convoy record and outlive the vessel/workspace. Who uploads (crew? actuator/hull side?), and what reference lands where?\n3. **Contained vessel.** Walls may forbid network beyond the allowlist. Upload happens on the hull/actuator side of the walls, not by the crew — does the Brief-delivery path (down) and artifact path (up) go through the same seam?\n4. **Single laptop, no fleet store.** A local backing (content-addressed directory, or RustFS run locally) behind the same interface. Durability = that disk, which is honest for a one-machine fleet.\n5. **Laptop offline / store unreachable.** Creating work must not fail on blob-store availability (echo of ADR 0015: \"creating work must never fail on a naming nicety\"). Expectation: write-local-then-sync, mirroring ADR 0016''s overlay model (you only ever write your own store; knowledge spreads when awake)?\n6. **Mixed/growing fleet.** Laptop-only fleet later gains the proxmox store. Do local blobs migrate, relay, or stay put with references repaired (mortal-keys discipline from ADR 0014/0016)?\n7. **Host death.** Truthful inventory says \"recording of vessel X exists\" — survivors can fetch it if it reached the fleet store; local-only blobs on the dead disk are honestly lost.\n\n## Candidate model (to test against scenarios, not pre-accepted)\n\n- A **BlobStore seam** with two backends: S3-compatible remote (RustFS/minio/AWS) and local content-addressed directory. Content addressing makes blobs immutable and convergent — union is the whole merge, no conflict semantics, relay-safe (same properties as ADR 0016''s convergent-facts class, one layer down).\n- Resources hold **typed blob references** (`brief_blob`, `artifacts[]`, `recording`) — blobs are an annex to the resource log, never inline in it.\n- Store configuration is fleet-level with per-root reachability (interacts with #625''s availability model); local spool + upload-on-reconnect for offline writes.\n- Retention/GC by reference from live/archived resources — needs a deliberate ruling (tombstoned convoys keep their inventory?).\n\n## Related\n#746 (Brief placement — its open question likely resolves to \"object storage + workspace materialization\"), ADR 0016 (death inventory, overlay/relay discipline), ADR 0015 (Brief as script-as-executed), #625 (availability), External Result (CONTEXT.md).","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/748/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/748/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/floti