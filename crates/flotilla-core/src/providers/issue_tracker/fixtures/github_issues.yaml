pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/741","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/741/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/741/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/741/events","html_url":"https://github.com/flotilla-org/flotilla/pull/741","id":4883281083,"node_id":"PR_kwDORel_087xjbGt","number":741,"title":"docs: ADR 0016 — overlay replication for cross-root state","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[],"state":"closed","locked":false,"assignees":[],"milestone":null,"comments":5,"created_at":"2026-07-14T13:00:40Z","updated_at":"2026-07-14T13:18:21Z","closed_at":"2026-07-14T13:18:19Z","assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":null,"active_lock_reason":null,"draft":false,"pull_request":{"url":"https://api.github.com/repos/flotilla-org/flotilla/pulls/741","html_url":"https://github.com/flotilla-org/flotilla/pull/741","diff_url":"https://github.com/flotilla-org/flotilla/pull/741.diff","patch_url":"https://github.com/flotilla-org/flotilla/pull/741.patch","merged_at":"2026-07-14T13:18:19Z"},"body":"The mechanism half of the #688 grill (the semantics half is recorded on the issue). Decides, against the fixed expectations:\n\n- **Overlay model**: per-root authored logs, no root ever writes another''s log (ADR 0002''s invariant held by construction); **durable** materialized replicas (never caches — ephemeral replicas would regress the merged view when an origin sleeps); relay of origin-immutable log segments; deterministic merge view — agreement by confluence, not consensus.\n- **Field merge**: per-field dots + per-record seen-vector, MV-register semantics. Causal supersession applies silently; true concurrency surfaces as conflicts; the clock never decides; resolution is an ordinary superseding write. Explicitly not last-writer-wins.\n- **One channel**: the store''s existing k8s-style HTTP watch API over a forwarded UDS; a replicator per peer; live tail (no cadence knob); per-kind opt-in by class; `FleetReplicaSnapshot` + Plane-A peer transport become deletable.\n- **Deletion**: authored tombstones, delete-vs-edit surfaces as a conflict, **permanent retention** (no GC — every horizon reopens resurrection with weeks-sleeping laptops in the fleet).\n- **Host death**: `flotilla host <name> declare-lost` / `found` (human decree — no timeout can tell dead from asleep); Host spec is definitions-class, status stays convergent facts; definitions need **no adoption** (replicas are permanent and survivor edits supersede — authorship is not ownership).\n- **Homing granularity**: vessels home at their placement host; the convoy record is coordination only and spans logs; per-vessel re-provision on vessel-host death; **succession** (not re-provision) when the convoy''s home dies or hands off — a hundred-vessel convoy is never torn down because its record-keeper died.\n- **Conflict UX**: detection is a read-path property; `<kind> <name> conflicts` / `resolve` CLI verbs; table row badges per ADR 0012; no new query family.\n\nAlso adds glossary entries: Convergent Facts, Definition (resource class), Home-bound Runtime, Succession.\n\nRefs #688.","closed_by":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/741/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/741/timeline","performed_via_github_app":null,"state_reason":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/738","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/738/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/738/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/738/events","html_url":"https://github.com/flotilla-org/flotilla/pull/738","id":4882884145,"node_id":"PR_kwDORel_087xiIB7","number":738,"title":"feat: add curated convoy tables","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[],"state":"closed","locked":false,"assignees":[],"milestone":null,"comments":5,"created_at":"2026-07-14T12:08:08Z","updated_at":"2026-07-14T13:07:20Z","closed_at":"2026-07-14T13:07:18Z","assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":null,"active_lock_reason":null,"draft":false,"pull_request":{"url":"https://api.github.com/repos/flotilla-org/flotilla/pulls/738","html_url":"https://github.com/flotilla-org/flotilla/pull/738","diff_url":"https://github.com/flotilla-org/flotilla/pull/738.diff","patch_url":"https://github.com/flotilla-org/flotilla/pull/738.patch","merged_at":"2026-07-14T13:07:18Z"},"body":"## Summary\n\n- add a surface-neutral typed column/action registry with per-view cursor, filter, scroll, and tab-local navigation state\n- replace the convoy split/tree screen with reusable flat convoy and vessel tables, including keyboard/mouse navigation, breadcrumbs, descriptions, honest phase/message display, and dependency ordering\n- route capability-guarded attach and force-complete actions through the typed app boundary, and make table refresh restart its query from a fresh cursor\n- remove the obsolete tree-widget dependency and replace the old snapshots with a reviewed production-projection table snapshot\n\n## Testing\n\n- `cargo +nightly-2026-03-12 fmt --check`\n- `cargo clippy --workspace --all-targets --locked -- -D warnings`\n- `mkdir -p .codex-tmp && TMPDIR=\"$PWD/.codex-tmp\" cargo test --workspace --locked --features flotilla-daemon/skip-no-sandbox-tests`\n\nCloses #733","closed_by":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/738/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/738/timeline","performed_via_github_app":null,"state_reason":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/733","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/733/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/733/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/733/events","html_url":"https://github.com/flotilla-org/flotilla/issues/733","id":4882309579,"node_id":"I_kwDORel_088AAAABIwIhyw","number":733,"title":"Tables v1 slice 1: table foundation + convoys/vessels conversion","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10393671168,"node_id":"LA_kwDORel_088AAAACa4LWAA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/ui","name":"ui","color":"C5DEF5","default":false,"description":"UI/UX and rendering"}],"state":"closed","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-14T10:46:55Z","updated_at":"2026-07-14T13:07:19Z","closed_at":"2026-07-14T13:07:19Z","assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#666 (umbrella) · ADR 0012 as amended by ADR 0014. First of four slices; pre-implementation survey by Codex on #666 confirmed the current convoy screen (bespoke split list/tree, global selection/filter state, no mouse) needs replacement, not wrapping, and that the Plane-A WorkItem action menu cannot be reused.\n\n## What to build\nThe complete table architecture, proven against real convoy data, with zero protocol changes (unscoped `Convoys` query only — #729 owns the QueryId reshape; do not touch it here):\n\n- **Surface-agnostic view-model layer** (extraction target): `ColumnSpec` + `ActionSpec` code registry per query family, typed row projection, per-View cursor/selection/filter state (no global UI state).\n- **One reusable ratatui table widget**: keyboard + mouse selection, one cursor regime, no focus traps.\n- **Registry entries** for convoy rows and scoped vessel rows.\n- **Replace the split/tree convoy screen** with flat tables: scoped vessel tables in topological order with a `depends_on` glyph column, honest phase/message columns (never a placeholder), breadcrumbs, describe (`y`) on rows.\n- **Drill navigation — recorded interpretation**: Enter drills by *mutating the current tab''s address* (push onto tab-local history); Esc pops that history. Each tab owns its history; identical to ADR 0013 scoped-mode semantics, preserving the single cursor regime and honest breadcrumbs. \"Open drill target in a new tab\" is a later explicit modifier action, never the default.\n- **Capability-guarded actions** on vessel rows: attach (workspace granularity) and complete-work, generated from ActionSpecs — nothing renders that doesn''t work. This is a new typed table-action boundary, not an extension of the Plane-A action menu.\n\n## Acceptance criteria\n- [ ] Convoy/vessel observation and recovery (attach, force-complete) work entirely through the new tables; the split/tree screen is gone\n- [ ] Mouse and keyboard both drive selection and drill; Esc pops tab-local history\n- [ ] Failure phases and messages visible in columns; density ≥ `flotilla ls`\n- [ ] Registry adding a column/action requires no widget changes\n- [ ] Snapshot diffs reviewed, not blind-accepted\n\n## Blocked by\nNone — can start immediately.","closed_by":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/733/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/733/timeline","performed_via_github_app":null,"state_reason":"completed","pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/742","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/742/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/742/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/742/events","html_url":"https://github.com/flotilla-org/flotilla/issues/742","id":4883287603,"node_id":"I_kwDORel_088AAAABIxEOMw","number":742,"title":"Implement overlay replication for cross-root state (ADR 0016)","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10420764394,"node_id":"LA_kwDORel_088AAAACbSA-6g","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/multi-host","name":"multi-host","color":"7B68EE","default":false,"description":"Multi-host peering and networking"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-14T13:01:30Z","updated_at":"2026-07-14T13:01:36Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#604 · Design: ADR 0016 (mechanism), #688 (expectations — both grill records). Umbrella; slice with /to-issues when scheduled.\n\n## What to build\nThe overlay replication mechanism, per ADR 0016:\n\n- **Durable replica area** in the store, keyed by origin root; a **replicator per peer** tailing the peer''s existing k8s-style HTTP watch API over a forwarded UDS, resumable via watch-from-version; relay (serve the replica area over the same watch surface, namespaced by origin).\n- **`merge` block on `ObjectMeta`** (per-field dots + per-record seen-vector), stamped by store write admission on definitions-class kinds only; per-kind class/replication declaration at kind-definition time.\n- **Deterministic merge view** for definitions-class consumers: MV-register per field — causal supersession applies, concurrency yields siblings; tombstones permanent; merged objects never written back.\n- **Class-aware read layer**: definitions merge; convergent facts union by natural key; home-bound runtime replicas are read-only staleness-stamped views.\n- **`flotilla host <name> declare-lost` / `found`** and the lost-runtime inventory flip; Host spec as definitions-class.\n- **Vessel homing at placement host**; convoy record **succession** (`succeeded_from`, cooperative handoff + after declare-lost); per-vessel re-provision from durable inputs.\n- **Conflict UX**: `<kind> <name> conflicts` / `resolve <field> --take <root>|--value` CLI verbs; table row conflict badges.\n- **Delete** the `FleetReplicaSnapshot` broadcast path once the aggregator reads durable replicas (the ADR 0002 deletion).\n\n## Acceptance criteria\n- [ ] Offline edit on one root converges silently after reconnect; concurrent same-field edits surface as a badged conflict with both values + provenance; resolution from any root dissolves it fleet-wide\n- [ ] Restarting a root while a peer sleeps does not regress any merged definition\n- [ ] A new root learns all definitions from any awake peer (relay), including those authored by a sleeping root\n- [ ] Delete propagates (no resurrection); delete-vs-edit surfaces as conflict\n- [ ] `host declare-lost` flips homed runtime to *lost* with truthful inventory; definitions authored by the lost root remain readable and editable with no adoption step\n- [ ] Convoy-home loss leaves vessels on other hosts running; succession repoints them; no convoy teardown\n- [ ] Contract tests run the merge/replication behavior against in-memory and sqlite backends per the testing philosophy\n\n## Blocked by\nTransport-interim is allowed (any UDS forwarding), so not hard-blocked on the Tender (#608) — but sequencing after M1 view-layer work; slice before starting.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/742/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/742/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/688","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/688/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/688/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/688/events","html_url":"https://github.com/flotilla-org/flotilla/issues/688","id":4873321971,"node_id":"I_kwDORel_088AAAABInj98w","number":688,"title":"Cross-root semantics for shared identities (projects, repos): scenario-first brainstorm","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10420764394,"node_id":"LA_kwDORel_088AAAACbSA-6g","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/multi-host","name":"multi-host","color":"7B68EE","default":false,"description":"Multi-host peering and networking"}],"state":"closed","locked":false,"assignees":[],"milestone":null,"comments":2,"created_at":"2026-07-13T11:49:49Z","updated_at":"2026-07-14T13:01:07Z","closed_at":"2026-07-14T13:01:07Z","assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32035970,"node_id":"IT_kwDOEBMoCM4B6NSC","name":"Brainstorm","description":"Needs brainstorming","color":"purple","created_at":"2026-03-20T23:03:42Z","updated_at":"2026-03-20T23:03:42Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Question\n\nFederation (ADR 0002) is deliberately not CRDT/consensus. So what should a user **observe** when more than one root knows about \"the same\" thing — the same project, the same repo, work on the same convoy seen from different machines? Today the answer is accidental: `Project` is a plain local resource (`flotilla-resources/src/project.rs`), so two roots can silently hold divergent records for one name and every consumer (convoy create, aggregator fleet merge, the #667 connector''s project spine) picks whichever its root has.\n\n## Method ruling (Robert, 2026-07-13)\n\nTwo constraints on how this brainstorm is conducted, recorded so they survive until the session:\n\n1. **Scenario-first, not model-first.** Walk through concrete situations and state what you would *expect* to happen in each — then design the data layer to deliver those expectations. Do not evaluate backwards from the replication model to \"what would happen in that model\" and call the result semantics. Technical considerations must not drive observable behaviour (tail wagging dog).\n2. **Layering:** the **Tender is entirely about hosts, transports, and forwarding**. The control-plane data layer — replication semantics, identity, conflict behaviour, however it works — is **fully flotilla''s**. This is a flotilla data-layer design, not a Tender requirement; nothing from here goes on #608.\n\n## Seed scenarios (expectations to be written at the session; extend freely)\n\n1. Create project `flotilla` on kiwi. Later, on feta, run `flotilla convoy create --project flotilla`. What should happen?\n2. Both roots independently created a project named `flotilla` (accident, weeks apart, different `repositories` lists). What should `ls` / panels / convoy create show and do on each root?\n3. Deliberate two-machine life: laptop (kiwi) + workstation (feta), one project, editing its config from whichever machine you''re on — including while the laptop is off-network. Reconnect: expectation?\n4. Edit divergence in one window: `display_name` changed on kiwi, `repositories` changed on feta. Expectation on reconnect?\n5. Delete a project on one root. What do other roots show, immediately and later?\n6. The same git repo known to both roots via different remotes/aliases (#645''s gap). One project references it — is it \"the same repo\" everywhere?\n7. A convoy launched from kiwi with vessels placed on feta; kiwi lid-closes mid-run (the T3 scenario). Where does the convoy''s record live, who can act on it, what does feta show?\n8. A root dies permanently (disk loss). Which records should have survived elsewhere, and in what form — readable memory, or recoverable authority?\n9. Two roots both observe checkouts of the same repo (pure observed facts). Presumably plain union — confirm this is the uncontroversial base case and mark where the observed/desired line sits.\n10. A new machine joins the fleet. What does it need to learn, and from whom, before `--project flotilla` works there?\n\n## Candidate models — to be tested against the scenarios, not used as starting points\n\n- Single-home desired records + read-only replicas + surfaced (never auto-resolved) conflicts — sketched 2026-07-13, explicitly *not* pre-accepted; several scenarios above (3, 8) look likely to strain it.\n- External identity anchor (canonical repo / hub) with per-root projections.\n- Global desired state lives a level up (shared apiserver / \"real k8s\" branch of ADR 0002) and the federated tier never holds multi-root desired identity at all.\n- Whatever the scenarios demand that none of these deliver.\n\n## Related\n\n#645 (machine-independent repo identity), #625 (host/environment model), #650 (Governor residency — a project steward implies the project has a home *somewhere*), ADR 0002.","closed_by":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/688/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/688/timeline","performed_via_github_app":null,"state_reason":"completed","pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/740","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/740/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/740/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/740/events","html_url":"https://github.com/flotilla-org/flotilla/issues/740","id":4883224653,"node_id":"I_kwDORel_088AAAABIxAYTQ","number":740,"title":"Remove legacy convoy keybinding actions after table migration","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10347495064,"node_id":"LA_kwDORel_088AAAACaMI-mA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/from-review","name":"from-review","color":"BFD4F2","default":false,"description":"Issue filed from PR review feedback"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-07-14T12:53:54Z","updated_at":"2026-07-14T12:56:29Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":null,"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"From PR #738 review by @claude: https://github.com/flotilla-org/flotilla/pull/738#issuecomment-4969034945\n\nRemove the transitional `BindingModeId::ConvoyVessels`, `Action::CompleteConvoyWork`, and `Action::AttachConvoyVessel` parsing paths once the remaining curated-table slices have landed and existing user keybinding compatibility no longer requires them.\n\nThese paths are intentionally unreachable after #733: no View selects the legacy mode and table actions now flow through typed `TableIntent` values. Keep this cleanup separate so the foundation PR preserves compatibility while the migration is incomplete.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/740/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/740/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/739","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/739/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/739/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/739/events","html_url":"https://github.com/flotilla-org/flotilla/pull/739","id":4883023857,"node_id":"PR_kwDORel_087xilOn","number":739,"title":"refactor: rename sessions query to independents","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[],"state":"closed","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-07-14T12:27:17Z","updated_at":"2026-07-14T12:53:59Z","closed_at":"2026-07-14T12:53:57Z","assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":null,"active_lock_reason":null,"draft":false,"pull_request":{"url":"https://api.github.com/repos/flotilla-org/flotilla/pulls/739","html_url":"https://github.com/flotilla-org/flotilla/pull/739","diff_url":"https://github.com/flotilla-org/flotilla/pull/739.diff","patch_url":"https://github.com/flotilla-org/flotilla/pull/739.patch","merged_at":"2026-07-14T12:53:57Z"},"body":"## What\n\n- rename the control-plane `Sessions` query surface to `Independents`, including protocol rows, projections, federation, manifest input, and PM connector state\n- change the query wire spelling and manifest factory namespace from `sessions` to `independents`\n- preserve resource-layer `TerminalSession` and lifecycle `SessionPhase` terminology\n- cover the classification invariant that convoy-bound terminal sessions appear through convoy vessel rows and never through independents\n\n## Why\n\nIssue #731 establishes **Independent** as the canonical query/view noun for running terminal sessions that are not attached to a convoy. This removes the overloaded `Sessions` query vocabulary while leaving the underlying resource model intact.\n\n## Impact\n\nThis intentionally makes the query protocol spelling a breaking change with no compatibility shim. Consumers must subscribe to `independents` and decode `IndependentRow` values.\n\n## Validation\n\n- `cargo +nightly-2026-03-12 fmt --check`\n- `cargo clippy --workspace --all-targets --locked -- -D warnings`\n- `cargo test --workspace --locked --features flotilla-daemon/skip-no-sandbox-tests`\n- standards and spec reviews passed after strengthening the convoy classification integration test\n\nCloses #731","closed_by":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/739/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/739/timeline","performed_via_github_app":{"id":1144995,"client_id":"Iv23liVemv8A9if9v0F2","slug":"chatgpt-codex-connector","node_id":"A_kwHOAOQ6Gs4AEXij","owner":{"login":"openai","id":14957082,"node_id":"MDEyOk9yZ2FuaXphdGlvbjE0OTU3MDgy","avatar_url":"https://avatars.githubusercontent.com/u/14957082?v=4","gravatar_id":"","url":"https://api.github.com/users/openai","html_url":"https://github.com/openai","followers_url":"https://api.github.com/users/openai/followers","following_url":"https://api.github.com/users/openai/following{/other_user}","gists_url