mments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/755/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/755/events","html_url":"https://github.com/flotilla-org/flotilla/issues/755","id":4892928704,"node_id":"I_kwDORel_088AAAABI6QqwA","number":755,"title":"Daemon EOF strands event subscribers; long-lived clients must reconnect with exponential backoff","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444313,"node_id":"LA_kwDORel_088AAAACaLI2GQ","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/bug","name":"bug","color":"d73a4a","default":true,"description":"Something isn''t working"},{"id":10420764676,"node_id":"LA_kwDORel_088AAAACbSBABA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/cli","name":"cli","color":"0E8A16","default":false,"description":"CLI commands and output formatting"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-15T13:29:18Z","updated_at":"2026-07-15T13:29:18Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015453,"node_id":"IT_kwDOEBMoCM4B6IRd","name":"Bug","description":"An unexpected problem or behavior","color":"red","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"Dogfood finding (daily driver, 2026-07-15, Robert): across a deliberate daemon restart, the `flotilla pm connect` pane logged `ERROR flotilla_client: daemon connection closed (EOF)` and became inoperative — the andamento catalog silently froze until manual restart.\n\nRuling: **long-lived clients reconnect with exponential backoff rather than becoming inoperative.**\n\n## Mechanism (verified)\n\nThree stacked defects:\n\n1. **The broadcast never closes.** `SocketDaemon`''s reader task breaks on EOF and fails pending *requests*, but `event_tx` is owned by the `SocketDaemon` struct itself, so subscribers'' `events.recv()` never yields `RecvError::Closed`. The connector''s `Closed` arm (`pm_connect.rs` `run_connector`) is unreachable; its select loop keeps firing the TTL reassert tick, republishing the stale catalog forever. Inoperative-but-alive.\n2. **The reconnect loop can kill the process.** `pm_connect::run` loops with a fixed 2s sleep, but `connect_or_spawn(...).await?` propagates — one failed reconnect attempt while the daemon is down exits the process.\n3. **No backoff.** Fixed 2s retry, no jitter, no cap.\n\n## Contract\n\n- **Client layer**: on transport EOF/read error, surface termination to broadcast subscribers deterministically (terminal connection-lost event, or drop the sender). No consumer should be able to await a closed connection forever.\n- **pm connect**: reconnect with exponential backoff + jitter + cap (e.g. 500ms → 30s); a failed attempt never exits the process; on reconnect, resubscribe — stale cursors already yield full `ResultSet`s via the gap machinery, and the TTL fade + re-assert design (already documented in the module) covers the away period.\n- **Incompatible daemon** (a no-compat upgrade landed while the client was away): the typed handshake failure (#723) must terminate the retry loop with a clear version message — daemon-away retries forever, daemon-incompatible exits loudly. The two must be distinguishable.\n- **Audit the other long-lived consumers**: `flotilla watch`, the TUI event loop — same stranding applies to anything holding a `subscribe()` receiver.\n\n## Acceptance\n- [ ] Kill + restart the daemon under a running `pm connect`: connector reconnects within backoff, catalog re-published, no manual intervention\n- [ ] Stop the daemon for longer than several backoff steps: connector keeps retrying at the cap, recovers when the daemon returns\n- [ ] Reconnect to a handshake-incompatible daemon: clean exit with the version message\n- [ ] A clean reconnect logs at INFO, not ERROR","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/755/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/755/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/754","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/754/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/754/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/754/events","html_url":"https://github.com/flotilla-org/flotilla/issues/754","id":4892858730,"node_id":"I_kwDORel_088AAAABI6MZag","number":754,"title":"pm connect: ''received delta for unknown repo, requesting replay'' warn at startup","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444313,"node_id":"LA_kwDORel_088AAAACaLI2GQ","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/bug","name":"bug","color":"d73a4a","default":true,"description":"Something isn''t working"},{"id":10420764676,"node_id":"LA_kwDORel_088AAAACbSBABA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/cli","name":"cli","color":"0E8A16","default":false,"description":"CLI commands and output formatting"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-15T13:20:51Z","updated_at":"2026-07-15T13:21:15Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015453,"node_id":"IT_kwDOEBMoCM4B6IRd","name":"Bug","description":"An unexpected problem or behavior","color":"red","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"Dogfood finding (daily driver, 2026-07-15, Robert), in the `flotilla pm connect` pane:\n\n```\nWARN flotilla_client: received delta for unknown repo, requesting replay repo_identity=github.com:flotilla-org/cleat repo=Some(\"/Users/robert/dev/cleat\")\n```\n\nGap recovery did its job (replay requested, connector recovered) — but a WARN on an apparently ordinary startup ordering (delta arriving before the client learned the repo) is noise that trains people to ignore warnings. Observed once, shortly after fleet restart on fresh stores.\n\n## Work\n- Determine whether this is the expected subscribe-before-repo-list race (client subscribes, daemon registers repos asynchronously, first delta for a late repo precedes its announcement). If so, downgrade to `debug!` or close the ordering hole (announce repo set before deltas).\n- If it recurs in steady state (not just startup), that''s a real identity-mapping bug between delta `repo_identity` and the client''s repo table — diagnose then.\n\n## Acceptance\n- [ ] Clean startup of `pm connect` against a warm daemon produces no WARN-level log lines\n- [ ] Genuine mid-session unknown-repo deltas (if possible) still warn","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/754/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/754/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/753","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/753/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/753/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/753/events","html_url":"https://github.com/flotilla-org/flotilla/issues/753","id":4892858564,"node_id":"I_kwDORel_088AAAABI6MYxA","number":753,"title":"Workspace open reports Succeeded and does nothing when no WorkspaceManager is active","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444313,"node_id":"LA_kwDORel_088AAAACaLI2GQ","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/bug","name":"bug","color":"d73a4a","default":true,"description":"Something isn''t working"},{"id":10393671168,"node_id":"LA_kwDORel_088AAAACa4LWAA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/ui","name":"ui","color":"C5DEF5","default":false,"description":"UI/UX and rendering"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-15T13:20:49Z","updated_at":"2026-07-15T13:21:14Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015453,"node_id":"IT_kwDOEBMoCM4B6IRd","name":"Bug","description":"An unexpected problem or behavior","color":"red","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"Dogfood finding (daily driver, 2026-07-15, Robert): double-clicking a worktree row in the TUI (worktree with a live shpool attachable set) showed the workspace-prepare progress, then nothing happened.\n\n## What actually happened (daemon log, 13:09:06–08)\n\n- The zellij workspace-manager provider was **never activated**: `MissingBinary(\"zellij >= 0.44.1 required, found 0.44.0\")` — the daemon''s PATH found a stale `~/.cargo/bin/zellij` 0.44.0, while the daily driver''s native-plugins zellij is 0.45.0 and would pass the gate.\n- The open-workspace flow nevertheless ran: step 0 \"Prepare workspace\" resolved all three member shpool attach commands and reported **Succeeded**; step 1 \"Attach workspace\" reported **Succeeded in ~50µs** — with no workspace manager to attach anything to. A silent no-op reported as success.\n\n## Two defects\n\n1. **Honesty**: with no active `WorkspaceManager`, the open-workspace command must fail loudly — ideally carrying the discovery reason (\"zellij >= 0.44.1 required, found 0.44.0\"), which the daemon already knows and logs at DEBUG. A step must not report `Succeeded` when it performed no observable action.\n2. **Environment/UX**: the version-gate failure was invisible — `flotilla status` health lists active providers but nothing surfaces *why* an expected provider is missing. The unmet-requirements list exists (`providers not activated: missing requirements`); it should be reachable from status/TUI, not only DEBUG logs.\n\nPlane A (bugfix-only): defect 1 is a correctness fix on the existing action path. Defect 2''s surfacing may be minimal (status line) to respect the freeze.\n\n## Environment note (not part of the fix)\nThe immediate daily-driver unblock is aligning the daemon''s zellij with the running spike build (0.45.0) — separate env action, tracked in the acceptance-run notes.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/753/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/753/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/752","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/752/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/752/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/752/events","html_url":"https://github.com/flotilla-org/flotilla/issues/752","id":4892858423,"node_id":"I_kwDORel_088AAAABI6MYNw","number":752,"title":"Discovered attachable sets never correlate to their worktree (checkout only set on the executor path)","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444313,"node_id":"LA_kwDORel_088AAAACaLI2GQ","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/bug","name":"bug","color":"d73a4a","default":true,"description":"Something isn''t working"},{"id":10429583487,"node_id":"LA_kwDORel_088AAAACbabQfw","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/provider","name":"provider","color":"411f2f","default":false,"description":"related to provider infra or implementation."}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-15T13:20:48Z","updated_at":"2026-07-15T13:21:13Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015453,"node_id":"IT_kwDOEBMoCM4B6IRd","name":"Bug","description":"An unexpected problem or behavior","color":"red","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"Dogfood finding (daily driver, 2026-07-15, Robert): attachable sets in the flotilla repo don''t correlate to their worktree rows on the Plane-A repo page.\n\n## Mechanism\n\n- Correlation emits `CorrelationKey::CheckoutPath` for a set **only when `set.checkout` is `Some`** (`data.rs` `correlate()`, attachable-set arm).\n- `set.checkout` is only populated by `ensure_terminal_set_with_change(..., Some(checkout), ...)` — and the only callers are in `executor/workspace.rs` (the workspace open/create path).\n- Sets that come back via **discovery** (e.g. shpool sessions rediscovered after a daemon restart or a store reset — which just happened fleet-wide with the pre-744 archive) get `checkout: None`, so they float uncorrelated forever.\n\nThe irony: discovery *has* the data — shpool sessions carry their working dir (the daemon''s own workspace-prepare log resolves `shpool ... attach --force --dir ''/Users/robert/dev/flotilla.materialization-query-scope'' <id>` per member). The set''s checkout can be derived from member sessions'' dir facts.\n\n## Fix direction\n\nPopulate `set.checkout` from member terminal dir facts at refresh/assembly time when absent (convergent observed fact — the dir all members share), rather than only at executor creation. Keep the executor path as-is.\n\n## Acceptance\n- [ ] A shpool set whose sessions run in a worktree correlates to that worktree row after a fresh daemon start with an empty attachable registry\n- [ ] Plane-A freeze respected: bugfix in the existing pipeline, no new capability\n\nPlane A (bugfix-only) — this is a correctness fix in existing correlation.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/752/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/752/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/749","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/749/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/749/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/749/events","html_url":"https://github.com/flotilla-org/flotilla/issues/749","id":4887532706,"node_id":"I_kwDORel_088AAAABI1HUog","number":749,"title":"Document or enforce terminal-input invariants for one-shot work patches","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10347495064,"node_id":"LA_kwDORel_088AAAACaMI-mA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/from-review","name":"from-review","color":"BFD4F2","default":false,"description":"Issue filed from PR review feedback"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-14T22:32:21Z","updated_at":"2026-07-14T22:32:21Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":null,"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"From PR #745 review by @claude[bot]: https://github.com/flotilla-org/flotilla/pull/745#issuecomment-4974602234\n\nSeveral ConvoyStatusPatch transitions rely on caller-side guards to ensure work is non-terminal before writing a sticky finished_at value: FailConvoy cancelled_work, ForceWorkCompleted, MarkWorkFailed, and MarkWorkCancelled.\n\nAudit whether these invariants should be enforced in the patch implementation, represented in the lifecycle contract, or documented next to both the patch and legal callers. The goal is to prevent future callers from accidentally treating a changed terminal outcome as a duplicate while preserving the existing legal transition model.\n\nContext: PR #745 deliberately leaves these one-shot transitions duplicate-only because current callers reject terminal input.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/749/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/749/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/746","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/746/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/746/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/746/events","html_url":"https://github.com/flotilla-org/flotilla/issues/746","id":4886021692,"node_id":"I_kwDORel_088AAAABIzrGPA","number":746,"title":"Multi-repository vessel workspaces: a checkout of every relevant repository","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-07-14T18:39:42Z","updated_at":"2026-07-14T18:58:30Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#604 · Ruling from Robert, 2026-07-14. Corrects a structural assumption that has already landed on main (through #744 and earlier).\n\n## The ruling\n\nConvoys — vessels, really — must not be locked to a checkout of one repository. The point of a multi-repository Project is that its vessels have **access to a checkout of each relevant repository**. Canonical scenario: one agent implementing a change across flotilla, andamento, cleat, and uishell.\n\n- **Default: every Project repository.** A convoy on a multi-repo Project gives its vessels checkouts of *all* constituent repositories. No required `--repository` selection at create time (supersedes the earlier inference ruling on #732).\n- **Narrowing is a vessel/workflow concern, not intent.** A more involved (agentic) workflow may scope a particular vessel to only its relevant repositories — an optional repository scope on `VesselRequirement`; absent means all.\n- **Workspace shape: a working directory with subdirectory checkouts.** In the multi-repo case the vessel''s working directory contains one worktree per relevant repository (subdirectory named by repository slug), each on the convoy branch. Crew sessions get the workspace root as cwd.\n\n## What is currently wrong on main\n\n- `ConvoySpec.repository: Option<ConvoyRepositorySpec>` — singular.\n- `VesselStatus.checkout_ref` / `VesselSpec.adopted_checkout_ref` — singular.\n- `VesselRequirement` cannot express repository scope.\n\n## Recommended shape (Claude; flagged where open)\n\n- `ConvoySpec.repositories: Vec<ConvoyRepositorySpec>` — **snapshotted at admission** from the Project (script-as-executed: later Project composition changes don''t mutate a running convoy).\n- One generated branch name per convoy, created as a worktree branch in each relevant repository. (Detached-head / delayed branch creation is noted as theoretically possible and deliberately out of scope — more complicated, no current need.)\n- `VesselStatus.checkout_refs` keyed by repository, replacing the singular field. Checkout resources stay one-per-(repo, branch, host) as today; a vessel references several.\n- Degenerate single-repo case keeps today''s ergonomics: cwd = the worktree itself, no wrapper directory. The nested layout appears only when more than one repository is relevant. *(Open: whether layout uniformity is worth breaking single-repo ergonomics — recommendation is no.)*\n- **Open question — Brief placement.** ADR 0015''s durable-inputs property (\"the Brief lives in the checkout and pushes with the work\") assumed one checkout. With several, recommendation is to write the Brief at the workspace root *and* stamp a copy into each worktree so re-provisioning from any surviving pushed branch retains it; needs a deliberate call.\n\n## Coordination\n\n- **#732 must not build on the singular shape** — its ConvoySpec slice (issue reference + snapshot) and checkout-naming slice should land on the plural model or land together with this reshape. Comment correcting the earlier repository-inference endorsement posted on #732.\n- #729 unaffected (issue queries never bind checkouts).\n- No-compat phase: reshape `ConvoySpec`/`VesselStatus` freely, no migration.\n\n## Acceptance\n- [ ] A convoy on a multi-repo Project provisions vessels whose workspace contains a worktree per constituent repository on the convoy branch\n- [ ] Single-repo convoys keep current layout and behavior\n- [ ] `VesselRequirement` can scope a vessel to a subset; absent scope = all convoy repositories\n- [ ] Stance/walls semantics apply to the whole workspace (all worktrees inside the walls)\n- [ ] Brief placement decided and recorded (durable-inputs property preserved for multi-repo)","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/746/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/746/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/748","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/748/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/748/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/748/events","html_url":"https://github.com/flotilla-org/flotilla/issues/748","id":4886155217,"node_id":"I_kwDORel_088AAAABIzzP0Q","number":748,"title":"Object storage for briefs, artifacts, recordings: fleet store + local fallback","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10420764394,"node_id":"LA_kwDORel_088AAAACbSA-6g","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/multi-host","name":"multi-host","color":"7B68EE","default":false,"description":"Multi-host peering and networking"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-14T18:58:13Z","updated_at":"2026-07-14T18:58:13Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32035970,"node_id":"IT_kwDOEBMoCM4B6NSC","name":"Brainstorm","description":"Needs brainstorming","color":"purple","created_at":"2026-03-20T23:03:42Z","updated_at":"2026-03-20T23:03:42Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Question\n\nFlotilla needs somewhere durable to put **things that are not resources and should not be forced into repos**: Briefs (currently the plan is stamping them into checkouts purely because the repo is the only durable store we have — #746''s open question), produced artifacts (demo videos, built binaries, reports), and eventually crew transcripts / cleat recordings (the enrichment ADR 0016''s death-inventory story explicitly deferred). Infra context: RustFS (S3-compatible) is being set up on the proxmoxes by an infra agent; some environments (single laptop) need a local thing instead.\n\nMethod ruling (standing): scenario-first — write expectations, then the model.\n\n## Seed scenarios\n\n1. **Brief at admission.** Convoy created from an issue; the Brief is the script-as-executed and must survive vessel teardown and host death *without* polluting the repo. Re-provisioning on another host fetches it. What does admission write, where, and what lands on `ConvoySpec`?\n2. **Artifact produced by a crew.** A vessel produces a demo video. It should attach to the convoy record and outlive the vessel/workspace. Who uploads (crew? actuator/hull side?), and what reference lands where?\n3. **Contained vessel.** Walls may forbid network beyond the allowlist. Upload happens on the hull/actuator side of the walls, not by the crew — does the Brief-delivery path (down) and artifact path (up) go through the same seam?\n4. **Single laptop, no fleet store.** A local backing (content-addressed directory, or RustFS run locally) behind the same interface. Durability = that disk, which is honest for a one-machine fleet.\n5. **Laptop offline / store unreachable.** Creating work must not fail on blob-store availability (echo of ADR 0015: \"creating work must never fail on a naming nicety\"). Expectation: write-local-then-sync, mirroring ADR 0016''s overlay model (you only ever write your own store; knowledge spreads when awake)?\n6. **Mixed/growing fleet.** Laptop-only fleet later gains the proxmox store. Do local blobs migrate, relay, or stay put with references repaired (mortal-keys discipline from ADR 0014/0016)?\n7. **Host death.** Truthful inventory says \"recording of vessel X exists\" — survivors can fetch it if it reached the fleet store; local-only blobs on the dead disk are honestly lost.\n\n## Candidate model (to test against scenarios, not pre-accepted)\n\n- A **BlobStore seam** with two backends: S3-compatible remote (RustFS/minio/AWS) and local content-addressed directory. Content addressing makes blobs immutable and convergent — union is the whole merge, no conflict semantics, relay-safe (same properties as ADR 0016''s convergent-facts class, one layer down).\n- Resources hold **typed blob references** (`brief_blob`, `artifacts[]`, `recording`) — blobs are an annex to the resource log, never inline in it.\n- Store configuration is fleet-level with per-root reachability (interacts with #625''s availability model); local spool + upload-on-reconnect for offline writes.\n- Retention/GC by reference from live/archived resources — needs a deliberate ruling (tombstoned convoys keep their inventory?).\n\n## Related\n#746 (Brief placement — its open question likely resolves to \"object storage + workspace materialization\"), ADR 0016 (death inventory, overlay/relay discipline), ADR 0015 (Brief as script-as-executed), #625 (availability), External Result (CONTEXT.md).","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/748/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/748/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/732","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/732/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/732/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/732/events","html_url":"https://github.com/flotilla-org/flotilla/issues/732","id":4882129501,"node_id":"I_kwDORel_088AAAABIv9iXQ","number":732,"title":"Start convoy from issue: intent verb + admission completion + snapshot Brief","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":2,"created_at":"2026-07-14T10:21:32Z","updated_at":"2026-07-14T18:40:58Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#629 · Story D of the M1 user-story grill (2026-07-14) → ADR 0015 (PR #727), amended by the #728 design grill and ADR 0014''s source-qualified issue-reference ruling.\n\n## What to build\nThe end-to-end path from an issue row to a working crew, per ADR 0015:\n\n- **Intent verb**: one flag-complete, non-interactively drivable `flotilla convoy start` invocation. The caller supplies a Project plus an issue ref/ID (provider-native shorthand is fine); the TUI issue-row action submits the same structured intent. The future governor is just another caller.\n- **Issue Source resolution**: resolve through the Project used to start work—its `issue_source` override when present, otherwise the relevant Repository Forge. Issue IDs are opaque strings, not numbers.\n- **Admission completion** on the convoy''s home daemon, before the spec persists: branch + convoy name generated together (reuse the Plane-A AiUtility call, new call site) with a deterministic fallback based on slugified issue title + opaque external ID when keyless/offline. Checkout path derives from branch. Store never holds a half-spec.\n- **Workflow default**: unspecified workflow resolves to the Project''s concrete `default_workflow_ref`; admission fails visibly while the referenced WorkflowTemplate or Repository is locally unresolved.\n- **Issue reference on work**: ConvoySpec carries the relevant RepositoryKey, canonical Issue Source identity, opaque external issue ID, and display snapshot (title, state, `as_of`). The source identity is captured with the work so a later Project issue-source change does not rewrite history.\n- **Snapshot Brief**: generated preamble (convoy, branch, repo, role, completion verbs) + issue title/body/labels stamped `as_of`, with the full source-qualified ref alongside + the human free-text slot.\n- Auto-attach on create per the recorded default (interactive starts land in the crew session).\n\nExplicitly out: governor/bosun (upstream completers, later), human-approval gate (policy knob on this pipeline, later), multiple simultaneous Project issue sources, and hull christening (record the field direction only if the allocation path is touched).\n\n## Acceptance criteria\n- [ ] From a Project issue row, one action produces a convoy with coherent generated branch/convoy names and lands attached in a genuinely contained crew session\n- [ ] The same result is reachable from one non-interactive CLI invocation\n- [ ] GitHub-style numeric and Linear-style opaque issue IDs both round-trip\n- [ ] The persisted work reference remains resolvable/understandable after the Project changes its Issue Source\n- [ ] Fully specified intent receives no completion (governor-path property)\n- [ ] Keyless/offline create succeeds via the deterministic fallback\n- [ ] Missing Repository/WorkflowTemplate/Issue Source fails clearly before persistence\n- [ ] The Brief file contains the as-of-stamped issue snapshot + source-qualified ref + free text\n- [ ] Behavior tests use injected AiUtility and IssueProvider collaborators at InProcessDaemon level\n\n## Blocked by\n- #728 (Project default workflow, Repository keys, Forge/Issue Source)\n- #737 (truthful contained workflow and stance enforcement)\n- #729 (soft — issue-picker flow; the verb itself needs only a resolvable source-qualified ref)","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/732/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/732/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/729","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/729/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/729/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/729/events","html_url":"https://github.com/flotilla-org/flotilla/issues/729","id":4882124828,"node_id":"I_kwDORel_088AAAABIv9QHA","number":729,"title":"Demand-backed query materialization + issues{scope} query family","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10420764475,"node_id":"LA_kwDORel_088AAAACbSA_Ow","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/protocol","name":"protocol","color":"D4A017","default":false,"description":"Wire protocol, message format, handshake"},{"id":10429583487,"node_id":"LA_kwDORel_088AAAACbabQfw","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/provider","name":"provider","color":"411f2f","default":false,"description":"related to provider infra or implementation."}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":2,"created_at":"2026-07-14T10:20:53Z","updated_at":"2026-07-14T18:40:57Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#629 · Story B of the M1 user-story grill (2026-07-14) → ADR 0014 (PR #727), demand-backed + issues sections, as amended by the #728 design grill.\n\n## What to build\nThe Aggregator''s second materialization class and its first family, `issues{scope}`:\n\n- **Parameterized QueryId**: family + owned scope params (Project ref / typed RepositoryKey). Scope rides the View address per ADR 0013''s `?key=value` channel.\n- **Issue Source resolution**:\n  - Repository scope uses that Repository''s Forge-backed issue source.\n  - Project scope uses the Project''s single `issue_source` override when present.\n  - Without an override, Project scope expands to the constituent Repositories'' Forge sources and unions their windows inside the Aggregator.\n  - No resolvable source returns an explicit `IssueSourceUnavailable` condition, never an ordinary empty result set.\n- **Portable binding, local provider**: Forge/Issue Source identifies the external service + scope only. Each host independently selects an installed provider and credentials capable of serving it; provider implementation names and credentials never enter Project/Repository definitions.\n- **Opaque IDs**: issue IDs are strings. GitHub `728` and Linear `WIDGET-123` are both valid; nothing assumes numeric issue numbers.\n- **Demand-backed materializer**: exists only while ≥1 subscription; window = first page of open issues, updated-desc; kept fresh through the selected IssueProvider''s `list_issues_changed_since`; discarded on unsubscribe. Nothing persists.\n- **Fetch-more as an intent on the result set**: appends the next page as ordinary deltas; paging state server-side; consumers never stitch pages. Search beyond the window = separate ephemeral scoped query over `search_issues`.\n- **Set metadata**: demand-backed ResultSets carry `as_of` and `has_more`; store-backed sets omit them. Seq/gap contract unchanged.\n- **Reuse**: existing IssueProvider adapters are the fetch layer (paged list, search, fetch-by-id, changed-since + ETag). Replay fixtures carry over.\n\nExplicitly out: storing issues (the Forge/Issue Source is the system of record — ADR 0014 forbids replication), issue mutation features, multiple simultaneous Project issue-source overrides, and `change_requests{scope}` (same shape, later).\n\n## Acceptance criteria\n- [ ] Subscribing `issues{repo}` yields a windowed ResultSet with `as_of`/`has_more`; unsubscribing tears the materialization down\n- [ ] Project scope with no override returns the union of constituent Repository Forge windows\n- [ ] Project scope with an `issue_source` override uses exactly that source\n- [ ] Missing/unserviceable source is distinguishable from a valid empty window\n- [ ] Opaque non-numeric issue IDs survive query/delta round trips\n- [ ] Fetch-more extends the window via deltas without a resubscribe\n- [ ] Incremental refresh updates/evicts rows in a live window\n- [ ] Contract tests run against in-memory IssueProviders; replay fixtures cover real adapters\n\n## Blocked by\n- #728 (Repository/Project scope keys, Forge, Project Issue Source)","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/729/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/729/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/742","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/742/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/742/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/742/events","html_url":"https://github.com/flotilla-org/flotilla/issues/742","id":4883287603,"node_id":"I_kwDORel_088AAAABIxEOMw","number":742,"title":"Implement overlay replication for cross-root state (ADR 0016)","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10420764394,"node_id":"LA_kwDORel_088AAAACbSA-6g","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/multi-host","name":"multi-host","color":"7B68EE","default":false,"description":"Multi-host peering and networking"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-14T13:01:30Z","updated_at":"2026-07-14T13:01:36Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#604 · Design: ADR 0016 (mechanism), #688 (expectations — both grill records). Umbrella; slice with /to-issues when scheduled.\n\n## What to build\nThe overlay replication mechanism, per ADR 0016:\n\n- **Durable replica area** in the store, keyed by origin root; a **replicator per peer** tailing the peer''s existing k8s-style HTTP watch API over a forwarded UDS, resumable via watch-from-version; relay (serve the replica area over the same watch surface, namespaced by origin).\n- **`merge` block on `ObjectMeta`** (per-field dots + per-record seen-vector), stamped by store write admission on definitions-class kinds only; per-kind class/replication declaration at kind-definition time.\n- **Deterministic merge view** for definitions-class consumers: MV-register per field — causal supersession applies, concurrency yields siblings; tombstones permanent; merged objects never written back.\n- **Class-aware read layer**: definitions merge; convergent facts union by natural key; home-bound runtime replicas are read-only staleness-stamped views.\n- **`flotilla host <name> declare-lost` / `found`** and the lost-runtime inventory flip; Host spec as definitions-class.\n- **Vessel homing at placement host**; convoy record **succession** (`succeeded_from`, cooperative handoff + after declare-lost); per-vessel re-provision from durable inputs.\n- **Conflict UX**: `<kind> <name> conflicts` / `resolve <field> --take <root>|--value` CLI verbs; table row conflict badges.\n- **Delete** the `FleetReplicaSnapshot` broadcast path once the aggregator reads durable replicas (the ADR 0002 deletion).\n\n## Acceptance criteria\n- [ ] Offline edit on one root converges silently after reconnect; concurrent same-field edits surface as a badged conflict with both values + provenance; resolution from any root dissolves it fleet-wide\n- [ ] Restarting a root while a peer sleeps does not regress any merged definition\n- [ ] A new root learns all definitions from any awake peer (relay), including those authored by a sleeping root\n- [ ] Delete propagates (no resurrection); delete-vs-edit surfaces as conflict\n- [ ] `host declare-lost` flips homed runtime to *lost* with truthful inventory; definitions authored by the lost root remain readable and editable with no adoption step\n- [ ] Convoy-home loss leaves vessels on other hosts running; succession repoints them; no convoy teardown\n- [ ] Contract tests run the merge/replication behavior against in-memory and sqlite backends per the testing philosophy\n\n## Blocked by\nTransport-interim is allowed (any UDS forwarding), so not hard-blocked on the Tender (#608) — but sequencing after M1 view-layer work; slice before starting.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/742/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/742/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/740","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/740/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/740/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/740/events","html_url":"https://github.com/flotilla-org/flotilla/issues/740","id":4883224653,"node_id":"I_kwDORel_088AAAABIxAYTQ","number":740,"title":"Remove legacy convoy keybinding actions after table migration","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10347495064,"node_id":"LA_kwDORel_088AAAACaMI-mA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/from-review","name":"from-review","color":"BFD4F2","default":false,"description":"Issue filed from PR review feedback"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-07-14T12:53:54Z","updated_at":"2026-07-14T12:56:29Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":null,"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"From PR #738 review by @claude: https://github.com/flotilla-org/flotilla/pull/738#issuecomment-4969034945\n\nRemove the transitional `BindingModeId::ConvoyVessels`, `Action::CompleteConvoyWork`, and `Action::AttachConvoyVessel` parsing paths once the remaining curated-table slices have landed and existing user keybinding compatibility no longer requires them.\n\nThese paths are intentionally unreachable after #733: no View selects the legacy mode and table actions now flow through typed `TableIntent` values. Keep this cleanup separate so the foundation PR preserves compatibility while the migration is incomplete.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/740/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/740/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/645","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/645/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/645/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/645/events","html_url":"https://github.com/flotilla-org/flotilla/issues/645","id":4829135322,"node_id":"I_kwDORel_088AAAABH9bB2g","number":645,"title":"Define machine-independent repo identity for SSH aliases","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10429583487,"node_id":"LA_kwDORel_088AAAACbabQfw","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/provider","name":"provider","color":"411f2f","default":false,"description":"related to provider infra or implementation."}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-07-07T13:48:29Z","updated_at":"2026-07-14T12:21:22Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":null,"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Context\n\n#642 fixed the immediate bug where scp-style remotes using a bare ssh-config alias, for example `forgejo-manchego:robert/dinghy.git`, were rejected during repo URL canonicalization.\n\nThat fix intentionally canonicalizes the alias form to `https://<alias>/<owner>/<repo>` so adoption can proceed, but this identity is local to the machine''s SSH config. Two machines may use different aliases for the same Forgejo/GitHub/GitLab host, so cross-host listing and replica dedup can derive different repo identities for the same underlying repository.\n\n## Desired outcome\n\nDefine a repo identity path that is stable across hosts even when local Git remotes use SSH aliases.\n\nLikely related areas:\n\n- Project resource / repo identity model\n- canonical repo URL inference during adopted checkout create\n- cross-host listing and replica dedup\n\n## Acceptance notes\n\n- Alias-style remotes remain accepted.\n- A repo identity can be made machine-independent when enough project/remote metadata is available.\n- The fallback behavior for unknown aliases is explicit rather than silently pretending aliases are globally meaningful.\n\nFollow-up from #642 / PR #644 review.\n\n## Design resolution (2026-07-14, #728 grill)\n\n#728 now owns the implementation path:\n\n- Repository is a real convergent-facts resource with a typed key derived from verified canonical identity.\n- Machine-local SSH aliases resolve through an injected host-configuration resolver (initially `ssh -G`-backed).\n- A successfully resolved alias contributes the canonical hostname; the alias spelling never becomes global identity.\n- An unresolved alias fails as `unrecognised remote`; it never silently mints a second Repository.\n- Remote-less repositories use stable Host identity + normalized Git common directory instead of entering the alias path.\n- Checkout observation and `project add` share the same injected Repository inspection/registry boundary.\n\nKeep this issue open until #728 lands and these acceptance notes are covered; no separate identity mechanism should be implemented here.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/645/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/645/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/666","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/666/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/666/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/666/events","html_url":"https://github.com/flotilla-org/flotilla/issues/666","id":4854689951,"node_id":"I_kwDORel_088AAAABIVywnw","number":666,"title":"Generic per-kind table tabs (k9s-style) — v1 slice of ADR 0012","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10393671168,"node_id":"LA_kwDORel_088AAAACa4LWAA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/ui","name":"ui","color":"C5DEF5","default":false,"description":"UI/UX and rendering"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":2,"created_at":"2026-07-10T11:44:38Z","updated_at":"2026-07-14T10:47:58Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015454,"node_id":"IT_kwDOEBMoCM4B6IRe","name":"Feature","description":"A request, idea, or new functionality","color":"blue","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#604 · Grilled 2026-07-13 → **ADR 0012** (PR #701); re-derived scenario-first 2026-07-14 → **ADR 0014** (merged, amends 0012''s generic tier). **Now an umbrella**: implementation split into four slices after Codex''s pre-implementation survey (bespoke split/tree screen needs replacement not wrapping; Plane-A action menu not reusable; #729 owns the QueryId reshape).\n\n## Slices\n1. #733 — table foundation + convoys/vessels conversion (view-model registry, widget, drill = tab-local address history, vessel attach/complete). **Starts immediately.**\n2. #734 — independents table (with #731 rename).\n3. #735 — scoped tabs: checkouts + demand-backed issues tables (after #729/#730; start-convoy row action → #732).\n4. #736 — filtering: `/` fuzzy + structured scope params in the address.\n\nRecorded drill ruling: Enter mutates the current tab''s address (tab-local history), Esc pops; new-tab drill is a later explicit modifier, never the default.\n\n## Explicitly out (recorded follow-ons)\nThe generic `Resources{kind}` tier — repositioned by ADR 0014 as a possible future tier, columnar (SoA) if ever built. Also: Miller-columns cascade; TOML column overrides; saved queries; composite scope tabs (repo-view successor — its queries land in the slices, its tab composition is follow-on); fleet rows; connector-absence hints. Tables never gain create intents beyond row-scoped actions.\n\n## Acceptance (umbrella — closes when all slices land and this passes)\nA day of convoy-driven work in which the tables are how you **observe** (phases, failure messages visible — never a placeholder; staleness honest per class: `as_of` on demand-backed rows, replica-cache staleness on store-backed; density ≥ `flotilla ls`) and how you **recover** (attach at both granularities, force-complete, teardown; no focus traps; mouse fine) — while normal starts flow through auto-attach without touching the tables. Snapshot diffs reviewed, not blind-accepted.\n\n## Blocked by\nSlices: #733 (none) → #734 (#731), #735 (#729/#730), #736 (#735).","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/666/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/666/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/736","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/736/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/736/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/736/events","html_url":"https://github.com/flotilla-org/flotilla/issues/736","id":4882313412,"node_id":"I_kwDORel_088AAAABIwIwxA","number":736,"title":"Tables v1 slice 4: filtering — ephemeral fuzzy + structured scope params","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.