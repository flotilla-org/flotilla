ttps://github.com/flotilla-org/flotilla/pull/756.diff","patch_url":"https://github.com/flotilla-org/flotilla/pull/756.patch","merged_at":null},"body":"## What changed\n\n- snapshot every project repository into a convoy with its canonical repository key, resolved base branch, stable workspace slug, and selected subpaths\n- provision one checkout per relevant repository while sharing a single vessel workspace root across host-direct and Docker placements\n- allow workflow vessels to narrow their repository scope and track checkout status per repository\n- create and preserve the convoy branch across worktrees and fresh clones, including stale local clones and existing remote branches\n- retain repository-less scratch convoy compatibility and repository-scoped adopted checkout behavior\n- update resource schemas, CRDs, projections, and regression coverage\n\n## Why\n\nProjects can span multiple repositories, but vessel provisioning previously assumed a single checkout. This made project-level workflows unable to present a coherent workspace or safely coordinate one convoy branch across all selected repositories.\n\n## Impact\n\nA vessel can now work from a shared root containing deterministic per-repository directories. Docker mounts the shared root once, host-direct agents receive briefs relative to that root, and single-repository behavior remains unchanged.\n\n## Validation\n\n- `cargo +nightly-2026-03-12 fmt --check`\n- `cargo clippy --workspace --all-targets --locked -- -D warnings`\n- `cargo test --workspace --locked --features flotilla-daemon/skip-no-sandbox-tests`\n- `cargo test -p flotilla-core --locked --features test-support --test in_process_daemon`\n\nCloses #746","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/756/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/756/timeline","pe