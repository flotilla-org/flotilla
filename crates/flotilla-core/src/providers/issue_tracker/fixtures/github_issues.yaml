sers/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-07-14T18:39:42Z","updated_at":"2026-07-14T18:58:30Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#604 · Ruling from Robert, 2026-07-14. Corrects a structural assumption that has already landed on main (through #744 and earlier).\n\n## The ruling\n\nConvoys — vessels, really — must not be locked to a checkout of one repository. The point of a multi-repository Project is that its vessels have **access to a checkout of each relevant repository**. Canonical scenario: one agent implementing a change across flotilla, andamento, cleat, and uishell.\n\n- **Default: every Project repository.** A convoy on a multi-repo Project gives its vessels checkouts of *all* constituent repositories. No required `--repository` selection at create time (supersedes the earlier inference ruling on #732).\n- **Narrowing is a vessel/workflow concern, not intent.** A more involved (agentic) workflow may scope a particular vessel to only its relevant repositories — an optional repository scope on `VesselRequirement`; absent means all.\n- **Workspace shape: a working directory with subdirectory checkouts.** In the multi-repo case the vessel''s working directory contains one worktree per relevant repository (subdirectory named by repository slug), each on the convoy branch. Crew sessions get the workspace root as cwd.\n\n## What is currently wrong on main\n\n- `ConvoySpec.repository: Option<ConvoyRepositorySpec>` — singular.\n- `VesselStatus.checkout_ref` / `VesselSpec.adopted_checkout_ref` — singular.\n- `VesselRequirement` cannot express repository scope.\n\n## Recommended shape (Claude; flagged where open)\n\n- `ConvoySpec.repositories: Vec<ConvoyRepositorySpec>` — **snapshotted at admission** from the Project (script-as-executed: later Project composition changes don''t mutate a running convoy).\n- One generated branch name per convoy, created as a worktree branch in each relevant repository. (Detached-head / delayed branch creation is noted as theoretically possible and deliberately out of scope — more complicated, no current need.)\n- `VesselStatus.checkout_refs` keyed by repository, replacing the singular field. Checkout resources stay one-per-(repo, branch, host) as today; a vessel references several.\n- Degenerate single-repo case keeps today''s ergonomics: cwd = the worktree itself, no wrapper directory. The nested layout appears only when more than one repository is relevant. *(Open: whether layout uniformity is worth breaking single-repo ergonomics — recommendation is no.)*\n- **Open question — Brief placement.** ADR 0015''s durable-inputs property (\"the Brief lives in the checkout and pushes with the work\") assumed one checkout. With several, recommendation is to write the Brief at the workspace root *and* stamp a copy into each worktree so re-provisioning from any surviving pushed branch retains it; needs a deliberate call.\n\n## Coordination\n\n- **#732 must not build on the singular shape** — its ConvoySpec slice (issue reference + snapshot) and checkout-naming slice should land on the plural model or land together with this reshape. Comment correcting the earlier repository-inference endorsement posted on #732.\n- #729 unaffected (issue queries never bind checkouts).\n- No-compat phase: reshape `ConvoySpec`/`VesselStatus` freely, no migration.\n\n## Acceptance\n- [ ] A convoy on a multi-repo Project provisions vessels whose workspace contains a worktree per constituent repository on the convoy branch\n- [ ] Single-repo convoys keep current layout and behavior\n- [ ] `VesselRequirement` can scope a vessel to a subset; absent scope = all convoy repositories\n- [ ] Stance/walls semantics apply to the whole workspace (all worktrees inside the walls)\n- [ ] Brief placement decided and recorded (durable-inputs property preserved for multi-repo)","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/746/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/746/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/742","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/742/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/742/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/742/events","html_url":"https://github.com/flotilla-org/flotilla/issues/742","id":4883287603,"node_id":"I_kwDORel_088AAAABIxEOMw","number":742,"title":"Implement overlay replication for cross-root state (ADR 0016)","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10420764394,"node_id":"LA_kwDORel_088AAAACbSA-6g","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/multi-host","name":"multi-host","color":"7B68EE","default":false,"description":"Multi-host peering and networking"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-14T13:01:30Z","updated_at":"2026-07-14T13:01:36Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#604 · Design: ADR 0016 (mechanism), #688 (expectations — both grill records). Umbrella; slice with /to-issues when scheduled.\n\n## What to build\nThe overlay replication mechanism, per ADR 0016:\n\n- **Durable replica area** in the store, keyed by origin root; a **replicator per peer** tailing the peer''s existing k8s-style HTTP watch API over a forwarded UDS, resumable via watch-from-version; relay (serve the replica area over the same watch surface, namespaced by origin).\n- **`merge` block on `ObjectMeta`** (per-field dots + per-record seen-vector), stamped by store write admission on definitions-class kinds only; per-kind class/replication declaration at kind-definition time.\n- **Deterministic merge view** for definitions-class consumers: MV-register per field — causal supersession applies, concurrency yields siblings; tombstones permanent; merged objects never written back.\n- **Class-aware read layer**: definitions merge; convergent facts union by natural key; home-bound runtime replicas are read-only staleness-stamped views.\n- **`flotilla host <name> declare-lost` / `found`** and the lost-runtime inventory flip; Host spec as definitions-class.\n- **Vessel homing at placement host**; convoy record **succession** (`succeeded_from`, cooperative handoff + after declare-lost); per-vessel re-provision from durable inputs.\n- **Conflict UX**: `<kind> <name> conflicts` / `resolve <field> --take <root>|--value` CLI verbs; table row conflict badges.\n- **Delete** the `FleetReplicaSnapshot` broadcast path once the aggregator reads durable replicas (the ADR 0002 deletion).\n\n## Acceptance criteria\n- [ ] Offline edit on one root converges silently after reconnect; concurrent same-field edits surface as a badged conflict with both values + provenance; resolution from any root dissolves it fleet-wide\n- [ ] Restarting a root while a peer sleeps does not regress any merged definition\n- [ ] A new root learns all definitions from any awake peer (relay), including those authored by a sleeping root\n- [ ] Delete propagates (no resurrection); delete-vs-edit surfaces as conflict\n- [ ] `host declare-lost` flips homed runtime to *lost* with truthful inventory; definitions authored by the lost root remain readable and editable with no adoption step\n- [ ] Convoy-home loss leaves vessels on other hosts running; succession repoints them; no convoy teardown\n- [ ] Contract tests run the merge/replication behavior against in-memory and sqlite backends per the testing philosophy\n\n## Blocked by\nTransport-interim is allowed (any UDS forwarding), so not hard-blocked on the Tender (#608) — but sequencing after M1 view-layer work; slice before starting.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/742/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/742/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/740","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/740/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/740/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/740/events","html_url":"https://github.com/flotilla-org/flotilla/issues/740","id":4883224653,"node_id":"I_kwDORel_088AAAABIxAYTQ","number":740,"title":"Remove legacy convoy keybinding actions after table migration","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10347495064,"node_id":"LA_kwDORel_088AAAACaMI-mA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/from-review","name":"from-review","color":"BFD4F2","default":false,"description":"Issue filed from PR review feedback"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-07-14T12:53:54Z","updated_at":"2026-07-14T12:56:29Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":null,"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"From PR #738 review by @claude: https://github.com/flotilla-org/flotilla/pull/738#issuecomment-4969034945\n\nRemove the transitional `BindingModeId::ConvoyVessels`, `Action::CompleteConvoyWork`, and `Action::AttachConvoyVessel` parsing paths once the remaining curated-table slices have landed and existing user keybinding compatibility no longer requires them.\n\nThese paths are intentionally unreachable after #733: no View selects the legacy mode and table actions now flow through typed `TableIntent` values. Keep this cleanup separate so the foundation PR preserves compatibility while the migration is incomplete.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/740/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/740/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/736","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/736/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/736/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/736/events","html_url":"https://github.com/flotilla-org/flotilla/issues/736","id":4882313412,"node_id":"I_kwDORel_088AAAABIwIwxA","number":736,"title":"Tables v1 slice 4: filtering — ephemeral fuzzy + structured scope params","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10393671168,"node_id":"LA_kwDORel_088AAAACa4LWAA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/ui","name":"ui","color":"C5DEF5","default":false,"description":"UI/UX and rendering"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-14T10:47:25Z","updated_at":"2026-07-14T10:47:28Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#666 (umbrella) · ADR 0012 §Filtering, ADR 0014 (scope params).\n\n## What to build\n- `/` ephemeral fuzzy filter over the visible rows of any table (per-View state from #733, discarded on Esc).\n- Structured scope refinement (host, project, phase-class) that lives in the query scope and therefore the tab address — narrowing is an address change, shareable and restorable.\n\n## Acceptance criteria\n- [ ] `/` filters any table without touching subscriptions; Esc clears\n- [ ] Structured narrowing round-trips through the tab address (close/reopen restores it)\n- [ ] Works uniformly across all four families\n\n## Blocked by\n- #735 (scoped tabs)","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/736/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/736/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/735","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/735/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/735/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/735/events","html_url":"https://github.com/flotilla-org/flotilla/issues/735","id":4882311723,"node_id":"I_kwDORel_088AAAABIwIqKw","number":735,"title":"Tables v1 slice 3: scoped tabs — checkouts + demand-backed issues tables","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10393671168,"node_id":"LA_kwDORel_088AAAACa4LWAA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/ui","name":"ui","color":"C5DEF5","default":false,"description":"UI/UX and rendering"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-14T10:47:12Z","updated_at":"2026-07-14T10:47:27Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#666 (umbrella) · ADR 0014 (scoped families, demand-backed materialization).\n\n## What to build\nScope arrives in the view layer:\n\n- Scope params flow ViewAddress (`?key=value`, ADR 0013) → SubscribeQueries, for all four families.\n- **Checkouts table** over `checkouts{scope}` (#730): worktrees/clones with host + authority columns.\n- **Issues table** over `issues{scope}` (#729, demand-backed): render `as_of` staleness and `has_more`; fetch-more intent on scroll-near-bottom / explicit key; search beyond the window via the ephemeral search query. Issue rows carry the start-convoy action submitting intent to #732''s verb (with the project''s default workflow).\n\n## Acceptance criteria\n- [ ] A repo-scoped issues tab shows the open-issues window with honest `as_of`; fetch-more extends it without resubscribe\n- [ ] Starting a convoy from an issue row lands attached in the crew session (#732 path)\n- [ ] Checkouts tab truthful across hosts\n- [ ] Scope lives in the tab address; reopening the address restores the scoped tab (no duplication)\n\n## Blocked by\n- #733 (foundation) · #729 (issues family + parameterized QueryId) · #730 (checkouts family) · #732 (soft — the row action degrades to absent while the verb is unbuilt, per capability-guarding)","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/735/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/735/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/732","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/732/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/732/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/732/events","html_url":"https://github.com/flotilla-org/flotilla/issues/732","id":4882129501,"node_id":"I_kwDORel_088AAAABIv9iXQ","number":732,"title":"Start convoy from issue: intent verb + admission completion + snapshot Brief","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":2,"created_at":"2026-07-14T10:21:32Z","updated_at":"2026-07-14T18:40:58Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#629 · Story D of the M1 user-story grill (2026-07-14) → ADR 0015 (PR #727), amended by the #728 design grill and ADR 0014''s source-qualified issue-reference ruling.\n\n## What to build\nThe end-to-end path from an issue row to a working crew, per ADR 0015:\n\n- **Intent verb**: one flag-complete, non-interactively drivable `flotilla convoy start` invocation. The caller supplies a Project plus an issue ref/ID (provider-native shorthand is fine); the TUI issue-row action submits the same structured intent. The future governor is just another caller.\n- **Issue Source resolution**: resolve through the Project used to start work—its `issue_source` override when present, otherwise the relevant Repository Forge. Issue IDs are opaque strings, not numbers.\n- **Admission completion** on the convoy''s home daemon, before the spec persists: branch + convoy name generated together (reuse the Plane-A AiUtility call, new call site) with a deterministic fallback based on slugified issue title + opaque external ID when keyless/offline. Checkout path derives from branch. Store never holds a half-spec.\n- **Workflow default**: unspecified workflow resolves to the Project''s concrete `default_workflow_ref`; admission fails visibly while the referenced WorkflowTemplate or Repository is locally unresolved.\n- **Issue reference on work**: ConvoySpec carries the relevant RepositoryKey, canonical Issue Source identity, opaque external issue ID, and display snapshot (title, state, `as_of`). The source identity is captured with the work so a later Project issue-source change does not rewrite history.\n- **Snapshot Brief**: generated preamble (convoy, branch, repo, role, completion verbs) + issue title/body/labels stamped `as_of`, with the full source-qualified ref alongside + the human free-text slot.\n- Auto-attach on create per the recorded default (interactive starts land in the crew session).\n\nExplicitly out: governor/bosun (upstream completers, later), human-approval gate (policy knob on this pipeline, later), multiple simultaneous Project issue sources, and hull christening (record the field direction only if the allocation path is touched).\n\n## Acceptance criteria\n- [ ] From a Project issue row, one action produces a convoy with coherent generated branch/convoy names and lands attached in a genuinely contained crew session\n- [ ] The same result is reachable from one non-interactive CLI invocation\n- [ ] GitHub-style numeric and Linear-style opaque issue IDs both round-trip\n- [ ] The persisted work reference remains resolvable/understandable after the Project changes its Issue Source\n- [ ] Fully specified intent receives no completion (governor-path property)\n- [ ] Keyless/offline create succeeds via the deterministic fallback\n- [ ] Missing Repository/WorkflowTemplate/Issue Source fails clearly before persistence\n- [ ] The Brief file contains the as-of-stamped issue snapshot + source-qualified ref + free text\n- [ ] Behavior tests use injected AiUtility and IssueProvider collaborators at InProcessDaemon level\n\n## Blocked by\n- #728 (Project default workflow, Repository keys, Forge/Issue Source)\n- #737 (truthful contained workflow and stance enforcement)\n- #729 (soft — issue-picker flow; the verb itself needs only a resolvable source-qualified ref)","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/732/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/732/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/730","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/730/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/730/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/730/events","html_url":"https://github.com/flotilla-org/flotilla/issues/730","id":4882126532,"node_id":"I_kwDORel_088AAAABIv9WxA","number":730,"title":"checkouts{scope} curated query over observed Checkout resources","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10393665220,"node_id":"LA_kwDORel_088AAAACa4K-xA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/quick-win","name":"quick-win","color":"2EA44F","default":false,"description":"Small, well-scoped tasks suitable for agent batches"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-14T10:21:07Z","updated_at":"2026-07-14T10:21:42Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#604 · Story B of the M1 user-story grill (2026-07-14) → ADR 0014 (PR #727).\n\n## What to build\nA store-backed curated query family `checkouts{scope}` projecting the observed Checkout resources (#674): which worktrees/clones exist, where, on which host — the bread-and-butter of the current repo view, needed by the project tab (repo-view successor). Typed `CheckoutRow` (resource ref, repo key, path, branch, host, authority), same ResultSet/delta contract as `convoys`. Scope params per ADR 0014 (repo key / project ref).\n\n## Acceptance criteria\n- [ ] `checkouts{repo}` subscription delivers rows for observed checkouts and deltas as they appear/vanish\n- [ ] Rows carry origin host and lifecycle authority\n- [ ] Same contract tests as the existing convoys/sessions queries\n\n## Blocked by\n- #729 (parameterized QueryId lands there; the projection itself is independent)","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/730/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/730/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/729","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/729/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/729/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/729/events","html_url":"https://github.com/flotilla-org/flotilla/issues/729","id":4882124828,"node_id":"I_kwDORel_088AAAABIv9QHA","number":729,"title":"Demand-backed query materialization + issues{scope} query family","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10420764475,"node_id":"LA_kwDORel_088AAAACbSA_Ow","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/protocol","name":"protocol","color":"D4A017","default":false,"description":"Wire protocol, message format, handshake"},{"id":10429583487,"node_id":"LA_kwDORel_088AAAACbabQfw","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/provider","name":"provider","color":"411f2f","default":false,"description":"related to provider infra or implementation."}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":2,"created_at":"2026-07-14T10:20:53Z","updated_at":"2026-07-14T18:40:57Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#629 · Story B of the M1 user-story grill (2026-07-14) → ADR 0014 (PR #727), demand-backed + issues sections, as amended by the #728 design grill.\n\n## What to build\nThe Aggregator''s second materialization class and its first family, `issues{scope}`:\n\n- **Parameterized QueryId**: family + owned scope params (Project ref / typed RepositoryKey). Scope rides the View address per ADR 0013''s `?key=value` channel.\n- **Issue Source resolution**:\n  - Repository scope uses that Repository''s Forge-backed issue source.\n  - Project scope uses the Project''s single `issue_source` override when present.\n  - Without an override, Project scope expands to the constituent Repositories'' Forge sources and unions their windows inside the Aggregator.\n  - No resolvable source returns an explicit `IssueSourceUnavailable` condition, never an ordinary empty result set.\n- **Portable binding, local provider**: Forge/Issue Source identifies the external service + scope only. Each host independently selects an installed provider and credentials capable of serving it; provider implementation names and credentials never enter Project/Repository definitions.\n- **Opaque IDs**: issue IDs are strings. GitHub `728` and Linear `WIDGET-123` are both valid; nothing assumes numeric issue numbers.\n- **Demand-backed materializer**: exists only while ≥1 subscription; window = first page of open issues, updated-desc; kept fresh through the selected IssueProvider''s `list_issues_changed_since`; discarded on unsubscribe. Nothing persists.\n- **Fetch-more as an intent on the result set**: appends the next page as ordinary deltas; paging state server-side; consumers never stitch pages. Search beyond the window = separate ephemeral scoped query over `search_issues`.\n- **Set metadata**: demand-backed ResultSets carry `as_of` and `has_more`; store-backed sets omit them. Seq/gap contract unchanged.\n- **Reuse**: existing IssueProvider adapters are the fetch layer (paged list, search, fetch-by-id, changed-since + ETag). Replay fixtures carry over.\n\nExplicitly out: storing issues (the Forge/Issue Source is the system of record — ADR 0014 forbids replication), issue mutation features, multiple simultaneous Project issue-source overrides, and `change_requests{scope}` (same shape, later).\n\n## Acceptance criteria\n- [ ] Subscribing `issues{repo}` yields a windowed ResultSet with `as_of`/`has_more`; unsubscribing tears the materialization down\n- [ ] Project scope with no override returns the union of constituent Repository Forge windows\n- [ ] Project scope with an `issue_source` override uses exactly that source\n- [ ] Missing/unserviceable source is distinguishable from a valid empty window\n- [ ] Opaque non-numeric issue IDs survive query/delta round trips\n- [ ] Fetch-more extends the window via deltas without a resubscribe\n- [ ] Incremental refresh updates/evicts rows in a live window\n- [ ] Contract tests run against in-memory IssueProviders; replay fixtures cover real adapters\n\n## Blocked by\n- #728 (Repository/Project scope keys, Forge, Project Issue Source)","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/729/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/729/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/725","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/725/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/725/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/725/events","html_url":"https://github.com/flotilla-org/flotilla/issues/725","id":4878659575,"node_id":"I_kwDORel_088AAAABIspv9w","number":725,"title":"Record native Zellij list-panes schema coverage","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10347495064,"node_id":"LA_kwDORel_088AAAACaMI-mA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/from-review","name":"from-review","color":"BFD4F2","default":false,"description":"Issue filed from PR review feedback"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-14T00:01:28Z","updated_at":"2026-07-14T00:01:28Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":null,"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"From PR #724 review by @claude[bot]: https://github.com/flotilla-org/flotilla/pull/724#issuecomment-4964016229\n\nAdd a real `REPLAY=record` provider test that exercises the multi-pane Zellij workspace path where the initial pane must be restored. The recording should capture `zellij action list-panes --json --all` from the supported native Andamento Zellij fork and lock the `tab_id`, `is_plugin`, `is_focused`, and `id` schema used by `initial_terminal_pane_id`.\n\nPR #724 already has deterministic unit coverage using JSON captured from the native fork and was live-validated, so this is additional contract coverage rather than a blocker for the race fix.\n","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/725/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/725/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/708","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/708/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/708/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/708/events","html_url":"https://github.com/flotilla-org/flotilla/issues/708","id":4877271730,"node_id":"I_kwDORel_088AAAABIrVCsg","number":708,"title":"Build the manifest metadata-patch connector v0 (flotilla pm connect + attach pane stamping)","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10363475967,"node_id":"LA_kwDORel_088AAAACabYX_w","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/integration","name":"integration","color":"0E8A16","default":false,"description":"New provider or tool integration"},{"id":10420764475,"node_id":"LA_kwDORel_088AAAACbSA_Ow","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/protocol","name":"protocol","color":"D4A017","default":false,"description":"Wire protocol, message format, handshake"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-07-13T20:16:26Z","updated_at":"2026-07-13T23:06:15Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n\n#604 · Design: #667 (grilled 2026-07-11, currency-checked 2026-07-13 — design doc: `project-map/reports/manifest-connector-design-2026-07-11.html`). All prerequisites landed (#680, #682, #683, gate #672); worktree `manifest-metadata-patch-connector` exists on current main.\n\n## What to build\n\nThe manifest metadata-patch connector v0, per the #667 design:\n\n- **Half 1 — attach-time pane stamping:** `flotilla attach`, when running inside a PM, publishes pane → identity (`flotilla.session` = `<host>/<ns>/<session>` canonical join key + denormalized ids, no TTL) into the PM''s metadata plane before exec.\n- **Half 2 — the catalog:** `flotilla pm connect`, one per PM instance, PM-adjacent (never a flotillad facility). Dials the local daemon as a client, subscribes (`SubscribeQueries`) to the `convoys` and `sessions` named queries, and projects the fleet-merged rows into Group/Identity-targeted metadata patches: project → convoy → vessel hierarchy, latent entities included, phase/attention badges, recipes. TTL ≈30s, re-asserted ≈10s.\n\nv0 binds to andamento''s **current** pipe names and key spellings (`andamento-apply-metadata-patch`, `tab.*`, `git.repo`) — deliberate deviation from bind-after-Leg-1, recorded on #667. All spellings live in one wire module so the Leg-1 rename is one file.\n\n## Dependency direction (decided 2026-07-13)\n\nThe wire module **mirrors** `andamento-shared`''s patch serde for v0 (`MetadataPatch`/`MetadataTarget`/`MetadataValueUpdate`), verified by fixture round-trip tests against andamento''s actual JSON. This mirror is a stopgap, not the architecture:\n\n- **End state:** andamento, wheelhouse/uishell, **and flotilla** all depend on the shared `flotilla-org/manifest` crate once the manifest extraction convoy''s Leg 1 creates it. PM cores must not depend on flotilla; flotilla depending on a PM''s crate (`andamento-shared`) is even more backwards. The shared crate holds the non-flotilla-specific things: patch types, targets, store/resolver semantics, transport adapters.\n- **Stays in flotilla:** everything stringly flotilla-specific — the `flotilla.*` key spellings, the projection from result-set rows, recipe templates. These depend on flotilla metadata by construction and belong here.\n- At Leg 1, flotilla''s wire module shrinks to spellings + send-function selection, and the mirrored types are deleted in favour of the manifest crate dependency.\n\n## Slices\n\n1. **`manifest` wire module** — mirrored patch types matching andamento JSON exactly, pipe-name constants, send functions (zellij CLI pipe + unix socket), fixture round-trip tests against `andamento-shared` serde. Address minting behind a pluggable formatter: v0 recipes are `flotilla attach <ref>` only; `flotilla view <address>` (ADR 0013 addresses) plugs in when the #589 branch lands.\n2. **Projection library** — pure `ResultSet → Vec<MetadataPatch>`, fixture-tested (rows in, patches out): GroupPath spine (project_ref, repo fallback, archipelago ordinal), latent derivation rules, badge normalization (`status.state` ∈ idle/waiting/active/done/failed + `status.attention`), `factory.id` dedupe, explicit unsets on resource disappearance.\n3. **`flotilla pm connect`** — subscribe → project → send loop; PM detection from env (`ZELLIJ` ⇒ pipes; wheelhouse socket path ⇒ unix socket); TTL re-assertion cadence; gap ⇒ resubscribe with cursors; relist-on-desync. Protocol v8 handshake equality means the connector binary rides the daemon''s upgrade cadence.\n4. **Attach stamping** — protocol change: `AttachCommandResolved` returns the structured binding (session name, namespace, host, labels), not just a command string (no-compat, free to reshape). CLI stamps one Pane-target patch before exec. Staleness-until-pane-reuse accepted for v0. Shared stamp implementation with ADR 0012''s in-PM table attach.\n5. **Actuator workspace stamping** — tab-id two-step on flotilla-created zellij tabs (create → capture tab id → `Tab(id)` patch, the git-watcher factory pattern).\n\n## Acceptance (daily driver, spec §6 v1 bar)\n\n- [ ] zellij sidebar lists live + latent convoys/vessels from the catalog, cross-host through the local socket\n- [ ] phase/attention badges truthful — a failed convoy shows failed + its message, never masked\n- [ ] clicking a vessel with a running session attaches (recipe execution by the PM; connector not in the click path)\n- [ ] pane identity survives pool indirection and cross-host attach — the cwd derivation is dead by construction\n- [ ] daemon dies ⇒ catalog facts TTL out; pane stamps survive; daemon returns ⇒ re-list and re-assert; connector restarts idempotent\n\n## Non-goals\n\n- No `flotilla.leg.*` keys — reserved, never published\n- Rail-side latent rendering (andamento''s half of the v1 bar)\n- Presentation actuation in the connector seat (recorded direction, not v0)\n- Any flotilla dependency in manifest/andamento — the git-watcher stays the independence proof\n","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/708/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/708/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/666","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/666/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/666/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/666/events","html_url":"https://github.com/flotilla-org/flotilla/issues/666","id":4854689951,"node_id":"I_kwDORel_088AAAABIVywnw","number":666,"title":"Generic per-kind table tabs (k9s-style) — v1 slice of ADR 0012","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10393671168,"node_id":"LA_kwDORel_088AAAACa4LWAA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/ui","name":"ui","color":"C5DEF5","default":false,"description":"UI/UX and rendering"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":2,"created_at":"2026-07-10T11:44:38Z","updated_at":"2026-07-14T10:47:58Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015454,"node_id":"IT_kwDOEBMoCM4B6IRe","name":"Feature","description":"A request, idea, or new functionality","color":"blue","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#604 · Grilled 2026-07-13 → **ADR 0012** (PR #701); re-derived scenario-first 2026-07-14 → **ADR 0014** (merged, amends 0012''s generic tier). **Now an umbrella**: implementation split into four slices after Codex''s pre-implementation survey (bespoke split/tree screen needs replacement not wrapping; Plane-A action menu not reusable; #729 owns the QueryId reshape).\n\n## Slices\n1. #733 — table foundation + convoys/vessels conversion (view-model registry, widget, drill = tab-local address history, vessel attach/complete). **Starts immediately.**\n2. #734 — independents table (with #731 rename).\n3. #735 — scoped tabs: checkouts + demand-backed issues tables (after #729/#730; start-convoy row action → #732).\n4. #736 — filtering: `/` fuzzy + structured scope params in the address.\n\nRecorded drill ruling: Enter mutates the current tab''s address (tab-local history), Esc pops; new-tab drill is a later explicit modifier, never the default.\n\n## Explicitly out (recorded follow-ons)\nThe generic `Resources{kind}` tier — repositioned by ADR 0014 as a possible future tier, columnar (SoA) if ever built. Also: Miller-columns cascade; TOML column overrides; saved queries; composite scope tabs (repo-view successor — its queries land in the slices, its tab composition is follow-on); fleet rows; connector-absence hints. Tables never gain create intents beyond row-scoped actions.\n\n## Acceptance (umbrella — closes when all slices land and this passes)\nA day of convoy-driven work in which the tables are how you **observe** (phases, failure messages visible — never a placeholder; staleness honest per class: `as_of` on demand-backed rows, replica-cache staleness on store-backed; density ≥ `flotilla ls`) and how you **recover** (attach at both granularities, force-complete, teardown; no focus traps; mouse fine) — while normal starts flow through auto-attach without touching the tables. Snapshot diffs reviewed, not blind-accepted.\n\n## Blocked by\nSlices: #733 (none) → #734 (#731), #735 (#729/#730), #736 (#735).","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/666/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/666/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/658","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/658/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/658/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/658/events","html_url":"https://github.com/flotilla-org/flotilla/issues/658","id":4839251916,"node_id":"I_kwDORel_088AAAABIHEfzA","number":658,"title":"Inter-crew workflow: bounce triggers, done-authority, artifact sync fabric","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10429583487,"node_id":"LA_kwDORel_088AAAACbabQfw","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/provider","name":"provider","color":"411f2f","default":false,"description":"related to provider infra or implementation."}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-07-08T16:19:11Z","updated_at":"2026-07-13T19:06:23Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32035970,"node_id":"IT_kwDOEBMoCM4B6NSC","name":"Brainstorm","description":"Needs brainstorming","color":"purple","created_at":"2026-03-20T23:03:42Z","updated_at":"2026-03-20T23:03:42Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#604 · ADR 0010 ''Parked'' · adjacent to #624\n\n(Parked Brainstorm.) The coder↔reviewer bounce and its generalisation. In-vessel and cross-vessel routing are the **same semantics with different transfer costs** — not two mechanisms. To design when real convoy practice (ADR 0008 harvest) forces it:\n\n1. **Bounce triggers** — local crew autonomy vs Bosun-always-involved.\n2. **Done-authority** — does exactly one crew member hold the capability to mark the wider task complete? (If ''only the Bosun'', completion authority becomes a PersistentAgent concern — flagged in ADR 0010.)\n3. **Artifact sync fabric** — code flows via commit/push; non-code artifacts (demo images, videos) need a decided fabric: crews *mark* artifacts with happens-after push↔pull/transfer, or always-write-to-a-shared-space (object storage). Ties to ADR 0006 External Results (referenced, not modeled).\n\n## Blocked by\nHarvest from real convoy practice; not blocking Daily-driver v1.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/658/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/658/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/655","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/655/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/655/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/655/events","html_url":"https://github.com/flotilla-org/flotilla/issues/655","id":4832147490,"node_id":"I_kwDORel_088AAAABIAS4Ig","number":655,"title":"Attach UX across presentation environments (ghostty tabs / uishell / zellij)","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10393671168,"node_id":"LA_kwDORel_088AAAACa4LWAA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/ui","name":"ui","color":"C5DEF5","default":false,"description":"UI/UX and rendering"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-07-07T20:52:37Z","updated_at":"2026-07-13T18:15:30Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32035970,"node_id":"IT_kwDOEBMoCM4B6NSC","name":"Brainstorm","description":"Needs brainstorming","color":"purple","created_at":"2026-03-20T23:03:42Z","updated_at":"2026-03-20T23:03:42Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#604 · presentation territory (phase 6, #610)\n\n(Parked Brainstorm — grill when further along.) `flotilla attach` behaviour plausibly differs by presentation environment:\n\n- **Plain terminal / basic PM (ghostty):** multiple crew targeted → open a tab per crew; multiple vessels → choice.\n- **Integrated (uishell; zellij + andamento):** first-class attach — a convoy tab with a tree of vessel tabs added to the sidebar.\n\nWorking position (guards #654''s scope): **`attach` itself stays ''attach exactly one thing into my current terminal''**, with simple menus for disambiguation. The richer environment-aware flows are presentation-manager behaviours — likely *different commands/verbs*, driven by Presentation resources / Yeoman — not extensions of `attach`.\n\nGrill later: verb taxonomy (attach vs open vs present?), how a PM advertises its capabilities, how convoy→tab-tree mapping is expressed (Presentation resource? PresentationPolicy dual per the presentation-direction notes).","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/655/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/655/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/650","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/650/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/650/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/650/events","html_url":"https://github.com/flotilla-org/flotilla/issues/650","id":4829595173,"node_id":"I_kwDORel_088AAAABH93GJQ","number":650,"title":"PersistentAgent kind + Governor v1 (island steward)","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10429583487,"node_id":"LA_kwDORel_088AAAACbabQfw","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/provider","name":"provider","color":"411f2f","default":false,"description":"related to provider infra or implementation."}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-07T14:44:15Z","updated_at":"2026-07-07T14:44:15Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32035970,"node_id":"IT_kwDOEBMoCM4B6NSC","name":"Brainstorm","description":"Needs brainstorming","color":"purple","created_at":"2026-03-20T23:03:42Z","updated_at":"2026-03-20T23:03:42Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#604 · ADR 0009\n\n## What to build\n(Brainstorm → implementation when sequenced.) The `PersistentAgent` kind (role as label), its reconciler (free-floating-vessel residency via VesselRequirement, bounded-restart supervision), and the first **Governor** for one island (plausibly dinghy or flotilla itself): charter-driven, fast-and-loose creds (ADR 0009 v1), memory ref backed by fs or a hub git repo, wakes itself for duties like upstream watching.\n\nBlocked conceptually by requirements/resolver v1 (ADR 0007) for the residency requirement — or can start with the seeded-policy equivalent if pulled forward by dogfooding.\n\n## Acceptance criteria\n- [ ] PersistentAgent kind + reconciler; agent survives daemon/host restart (re-materialised, memory intact)\n- [ ] Governor for one island: maintains issues/docs, watches an upstream, launches a convoy in its own namespace\n- [ ] Never edits source / raises PRs (charter v1; credential scoping tracked separately)\n\n## Blocked by\nSequencing decision — after observer reshape unless dogfooding pulls it forward.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/650/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/650/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/646","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/646/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/646/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/646/events","html_url":"https://github.com/flotilla-org/flotilla/issues/646","id":4829377604,"node_id":"I_kwDORel_088AAAABH9p0RA","number":646,"title":"Client SDK (Python/TS) for workflow programs, tracking the CLI surface","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10420764676,"node_id":"LA_kwDORel_088AAAACbSBABA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/cli","name":"cli","color":"0E8A16","default":false,"description":"CLI commands and output formatting"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-07T14:17:56Z","updated_at":"2026-07-07T14:17:57Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32035970,"node_id":"IT_kwDOEBMoCM4B6NSC","name":"Brainstorm","description":"Needs brainstorming","color":"purple","created_at":"2026-03-20T23:03:42Z","updated_at":"2026-03-20T23:03:42Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#604 · ADR 0008\n\n## What to build\n(Brainstorm.) A Python and/or TypeScript client API mirroring the CLI closely, so extracted workflow *programs* (ADR 0008) can create convoys, issue VesselRequirements, wait on legs/gates, and route information — authored primarily by agents. Simple programs should remain simply analysable.\n\nMust confront the **durable execution** question before growing beyond trivial scripts: ADR 0008 records three candidate shapes (level-triggered idempotent re-derivation from convoy state; event-sourced replay on the resource-store log; agent-transcript-as-state). Avoid temporal.io-style determinism constraints unless the lighter shapes prove insufficient.\n\n## Blocked by\nRequirements/resolver v1 (ADR 0007) shaping the API surface; sequencing after the observer reshape.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/646/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/646/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/645","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/645/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/645/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/645/events","html_url":"https://github.com/flotilla-org/flotilla/issues/645","id":4829135322,"node_id":"I_kwDORel_088AAAABH9bB2g","number":645,"title":"Define machine-independent repo identity for SSH aliases","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10429583487,"node_id":"LA_kwDORel_088AAAACbabQfw","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/provider","name":"provider","color":"411f2f","default":false,"description":"related to provider infra or implementation."}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-07-07T13:48:29Z","updated_at":"2026-07-14T12:21:22Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":null,"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Context\n\n#642 fixed the immediate bug where scp-style remotes using a bare ssh-config alias, for example `forgejo-manchego:robert/dinghy.git`, were rejected during repo URL canonicalization.\n\nThat fix intentionally canonicalizes the alias form to `https://<alias>/<owner>/<repo>` so adoption can proceed, but this identity is local to the machine''s SSH config. Two machines may use different aliases for the same Forgejo/GitHub/GitLab host, so cross-host listing and replica dedup can derive different repo identities for the same underlying repository.\n\n## Desired outcome\n\nDefine a repo identity path that is stable across hosts even when local Git remotes use SSH aliases.\n\nLikely related areas:\n\n- Project resource / repo identity model\n- canonical repo URL inference during adopted checkout create\n- cross-host listing and replica dedup\n\n## Acceptance notes\n\n- Alias-style remotes remain accepted.\n- A repo identity can be made machine-independent when enough project/remote metadata is available.\n- The fallback behavior for unknown aliases is explicit rather than silently pretending aliases are globally meaningful.\n\nFollow-up from #642 / PR #644 review.\n\n## Design resolution (2026-07-14, #728 grill)\n\n#728 now owns the implementation path:\n\n- Repository is a real convergent-facts resource with a typed key derived from verified canonical identity.\n- Machine-local SSH aliases resolve through an injected host-configuration resolver (initially `ssh -G`-backed).\n- A successfully resolved alias contributes the canonical hostname; the alias spelling never becomes global identity.\n- An unresolved alias fails as `unrecognised remote`; it never silently mints a second Repository.\n- Remote-less repositories use stable Host identity + normalized Git common directory instead of entering the alias path.\n- Checkout observation and `project add` share the same injected Repository inspection/registry boundary.\n\nKeep this issue open until #728 lands and these acceptance notes are covered; no separate identity mechanism should be implemented here.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/645/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/645/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/641","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/641/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/641/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/641/events","html_url":"https://github.com/flotilla-org/flotilla/issues/641","id":4819261492,"node_id":"I_kwDORel_088AAAABH0AYNA","number":641,"title":"Ensure timed-out replica snapshot SSH processes are killed","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10347495064,"node_id":"LA_kwDORel_088AAAACaMI-mA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/from-review","name":"from-review","color":"BFD4F2","default":false,"description":"Issue filed from PR review feedback"},{"id":10420764394,"node_id":"LA_kwDORel_088AAAACbSA-6g","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/multi-host","name":"multi-host","color":"7B68EE","default":false,"description":"Multi-host peering and networking"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-06T12:46:31Z","updated_at":"2026-07-06T12:46:31Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":null,"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Context\n\nPR #640 adds store-backed `flotilla ls` replica discovery. Review noted that the PR now bounds the common unreachable-host case with `ssh -o ConnectTimeout=2 -o ConnectionAttempts=1`, but the child process lifecycle is still not fully closed for a connected-but-wedged host.\n\n## Problem\n\n`fetch_fleet_replica_snapshot` wraps `runner.run_output(\"ssh\", ...)` in `tokio::time::timeout(FLEET_REPLICA_REFRESH_TIMEOUT, ...)`. Production uses `ProcessCommandRunner::run_output`, which currently awaits `tokio::process::Command::output()` without `kill_on_drop(true)`.\n\nIf SSH connects quickly but then hangs after connection, for example because the remote `flotilla --socket ... replica-snapshot` is wedged, the Tokio timeout drops the future but may leave the underlying `ssh` child alive until it exits on its own. Repeated refresh ticks could accumulate stale SSH processes for that host.\n\n## Suggested fix\n\nPick one of these after checking broader runner semantics:\n\n- Add `kill_on_drop(true)` in `ProcessCommandRunner::run_output` if that is safe for all callers.\n- Or make replica snapshot fetching spawn and explicitly kill the SSH child on timeout, keeping the behavior local to this feature.\n\n## Acceptance criteria\n\n- A timed-out replica snapshot fetch cannot leave a long-lived `ssh` child behind.\n- The unreachable-host path remains bounded by SSH options.\n- Tests cover the timeout behavior at the appropriate level, using a fake runner or process abstraction where possible.\n\nFiled from review feedback on #640.\n","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/641/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/641/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/636","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/636/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/636/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/636/events","html_url":"https://github.com/flotilla-org/flotilla/issues/636","id":4814421074,"node_id":"I_kwDORel_088AAAABHvY8Ug","number":636,"title":"Handle concurrent duplicate adopted convoy creates atomically","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10347495064,"node_id":"LA_kwDORel_088AAAACaMI-mA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/from-review","name":"from-review","color":"BFD4F2","default":false,"description":"Issue filed from PR review feedback"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-07-05T20:59:51Z","updated_at":"2026-07-05T21:04:44Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":null,"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"From PR #635 review by @claude: https://github.com/flotilla-org/flotilla/pull/635#issuecomment-4887568808\n\nThe adopted-checkout convoy create path now handles sequential duplicate creates safely, but the check for an existing convoy and the later convoy create are still not atomic. Two concurrent create requests for the same convoy name could both pass the initial not-found check, both create or reuse the deterministic adopted checkout resource, and then only one convoy create would win.\n\nThe current worst case is an orphaned adopted checkout resource with no owning convoy, not silent repointing of a live convoy. This should be addressed if duplicate or retried convoy create calls become common from automation.\n\nPossible directions:\n- reserve/create the Convoy before creating the adopted Checkout, while keeping repository/ref inference side-effect-free;\n- add a compensating cleanup for adopted checkout resources created by a failed convoy create;\n- introduce a transactional or idempotency boundary for convoy creation.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/636/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/636/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/634","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/634/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/634/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/634/events","html_url":"https://github.com/flotilla-org/flotilla/issues/634","id":4813393753,"node_id":"I_kwDORel_088AAAABHuaPWQ","number":634,"title":"Agent supervision graph: a live + replayable view of who is driving, watching, and talking to whom","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10362697938,"node_id":"LA_kwDORel_088AAAACaao40g","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/vision","name":"vision","color":"D4C5F9","default":false,"description":"Long-term direction"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-05T15:27:45Z","updated_at":"2026-07-05T15:27:45Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":null,"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## The idea\n\nAn alternate (or enhancing) uishell view to panels/tabs: a **live graph of the supervision and communication relationships between agents** as they work — nodes are agents/sessions/artifacts, edges are ''drives'', ''watches'', ''reviews'', ''messaged'', animated as relationships change (with transitions when a session moves from implementing to shepherding, a watcher takes control, a PR gains a reviewer…).\n\nThe motivating demo already happened, invisibly: a cleat dogfood run (cleat#87''s run log, cleat#94–#97, cleat#105) had a human watching, a Claude driving four codex sessions through the control plane, sessions self-shepherding PRs past a review bot — a rich, evolving topology whose only rendering was prose summaries.\n\n## Layering (who supplies what)\n\n- **Cleat supplies the node + attach-edge layer for free** — no new cleat work needed. Its directory subscription (cleat#99/#101) carries liveness and control state (controller/watcher per session), and its **tags** are deliberately generic flat labels, so supervision metadata (`driver=…`, `task=…`, `role=implementer|shepherd`) can hang off sessions without cleat knowing what it means. A first crude graph is drawable from the directory alone.\n- **Flotilla supplies the communication edges** — DMs, issues, chat-like topic boards are edge *sources* cleat rightly knows nothing about. Since comms channels are explicitly experimental at first, the view must be **channel-agnostic from day one**: edges are timestamped events from pluggable sources; a DM edge and an issue-comment edge render identically; channels swap without touching the view.\n- **Flotilla attributes out-of-band supervisors**: in the demo run the supervisor wasn''t a cleat session at all — its edges were control-plane calls from outside. Orchestrator-level attribution is required for a faithful graph; inference from cleat alone structurally cannot see this.\n- **Later enhancement sources**: session recordings + markers (post-hoc **replay** of the topology — scrub through the day watching the graph evolve), agent hooks, git/PR events.\n\n## Sequencing\n\nNot scheduled. First becomes buildable-in-crude-form when cleat''s directory subscription lands (cleat#99, in flight; cleat#101 adds tags). The design constraint worth honoring *now* is only: keep cleat tags generic, keep comms-edge sources pluggable.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/634/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/634/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/633","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/633/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/633/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/633/events","html_url":"https://github.com/flotilla-org/flotilla/issues/633","id":4810973027,"node_id":"I_kwDORel_088AAAABHsGfYw","number":633,"title":"M1: dogfood pass — real workloads, lid-close/reattach acceptance","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10364863894,"node_id":"LA_kwDORel_088AAAACactFlg","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/testing","name":"testing","color":"1D76DB","default":false,"description":"Test coverage and testing infrastructure"},{"id":10420764676,"node_id":"LA_kwDORel_088AAAACbSBABA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/cli","name":"cli","color":"0E8A16","default":false,"description":"CLI commands and output formatting"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":5,"created_at":"2026-07-05T00:06:46Z","updated_at":"2026-07-10T11:45:23Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#629\n\n## What to build\n(HITL.) Convert real daily sessions to convoy-launched vessels — rdg-dag rebase/ripple sessions, polaris slice maintenance, ordinary coding on flotilla/cleat/porthole/uishell — and run the acceptance test: **start a session from kiwi, close the lid, reattach the same crew from feta**. File every gap found as issues; report the first pass/failure to the portfolio brief channel.\n\n## Acceptance criteria\n- [ ] At least two real workloads running as adopted-vessel convoys for a working day\n- [ ] Lid-close / reattach-from-feta test passed (or failure analyzed + filed)\n- [ ] Cross-host listing verified truthful (including staleness) during the run\n- [ ] Gaps filed; status brief written back to the portfolio\n\n## Blocked by\n- #630\n- #631\n- #632","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/633/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/633/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/629","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/629/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/629/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/629/events","html_url":"https://github.com/flotilla-org/flotilla/issues/629","id":4810972746,"node_id":"I_kwDORel_088AAAABHsGeSg","number":629,"title":"tracking: M1 dogfood milestone — daily agent sessions in flotilla vessels","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10420764676,"node_id":"LA_kwDORel_088AAAACbSBABA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/cli","name":"cli","color":"0E8A16","default":false,"description":"CLI commands and output formatting"}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-05T00:06:41Z","updated_at":"2026-07-05T00:07:07Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"Umbrella for the dogfood milestone from the 2026-07-05 portfolio steer. **Metric: time until everyday agent sessions run under flotilla-managed cleat instead of bare ghostty tabs** — not migration completeness.\n\n## Definition (M1)\nEvery working agent session runs in a cleat pool inside a flotilla-managed or **adopted** vessel; sessions are initiated via convoys (single implicit Leg is fine); attach is `flotilla attach <ref>` composing the proven ssh + cleat-attach hop chain — NOT the phase-6 presentation stack.\n\n**Acceptance test:** start a session from kiwi, close the laptop lid, reattach the same crew from feta. Secondary: listing shows running work across kiwi + feta truthfully — where *truthfully* includes honest staleness for unreachable hosts.\n\n## Constraints\n- Thin, additive CLI/reconciler work, store-backed only — **no Plane A code** (no WorkItem/correlation/peer-merge), no new UI surfaces, no Tender pull-forward, no presentation stack.\n- Cross-host reads use the **replica-cache** model (reads always local + cached last-known peer state with staleness labels + generation awareness; sync best-effort with short timeouts; nothing ever hangs; topology-agnostic — solo laptop / +PC / hosted later are all just replica sources). Cross-host *commands* go over ssh''d CLI for now.\n- Keep-warm for Managed vessels is deferred; for adopted vessels it is free by construction (ADR 0003 — completing a convoy tears down the crew, never the adopted checkout).\n\n## Slices\n- [ ] #630 — convoy create targets an adopted existing worktree *(AFK; unblocked)*\n- [ ] #631 — `flotilla attach <ref>` ssh + cleat hop chain *(AFK; blocked by #630)*\n- [ ] #632 — replica-cache + honest cross-host listing *(AFK; blocked by #630)*\n- [ ] #633 — dogfood pass, lid-close acceptance *(HITL; blocked by #630-#632)*\n\n#622 re-queues after these slices.\n\nVocabulary per CONTEXT.md / PR #628: convoy → (implicit) Leg → vessel → crew.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/629/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/629/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/625","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/625/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/625/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/625/events","html_url":"https://github.com/flotilla-org/flotilla/issues/625","id":4711892182,"node_id":"I_kwDORel_088AAAABGNnE1g","number":625,"title":"Host / environment / location model","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10420764394,"node_id":"LA_kwDORel_088AAAACbSA-6g","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/multi-host","name":"multi-host","color":"7B68EE","default":false,"description":"Multi-host peering and networking"},{"id":10429583487,"node_id":"LA_kwDORel_088AAAACbabQfw","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/provider","name":"provider","color":"411f2f","default":false,"description":"related to provider infra or implementation."}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-06-21T20:39:07Z","updated_at":"2026-07-13T19:03:56Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32035970,"node_id":"IT_kwDOEBMoCM4B6NSC","name":"Brainstorm","description":"Needs brainstorming","color":"purple","created_at":"2026-03-20T23:03:42Z","updated_at":"2026-03-20T23:03:42Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#604\n\n## What to build\n(Parked design / Brainstorm.) Pin down the Host ↔ Environment relationship. Most resources live *in* an Environment. A Host is/has a direct environment and may contain nested ones (docker, sandbox-exec, firecracker); a service-provided Environment (runpod, modal, aws) may itself be an ephemeral Host. Reachability (Tender-local vs external-service API) is orthogonal to the resource/reference cut (ADR 0006) and needs a coherent model.\n\n## Acceptance criteria\n- [ ] (stub) A model for Host vs Environment, nesting, and how location/reachability is represented on resources\n\n## Blocked by\nParked — informs provisioning + federation work.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/625/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/625/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/624","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/624/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/624/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/624/events","html_url":"https://github.com/flotilla-org/flotilla/issues/624","id":4711892139,"node_id":"I_kwDORel_088AAAABGNnEqw","number":624,"title":"Agentic / dynamic convoy launch (first stage defines later stages)","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type"