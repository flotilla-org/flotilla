ver reshape (resource-log federation target) is in place.","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/608/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/608/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/650","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/650/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/650/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/650/events","html_url":"https://github.com/flotilla-org/flotilla/issues/650","id":4829595173,"node_id":"I_kwDORel_088AAAABH93GJQ","number":650,"title":"PersistentAgent kind + Governor v1 (island steward)","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10429583487,"node_id":"LA_kwDORel_088AAAACbabQfw","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/provider","name":"provider","color":"411f2f","default":false,"description":"related to provider infra or implementation."}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-07T14:44:15Z","updated_at":"2026-07-07T14:44:15Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32035970,"node_id":"IT_kwDOEBMoCM4B6NSC","name":"Brainstorm","description":"Needs brainstorming","color":"purple","created_at":"2026-03-20T23:03:42Z","updated_at":"2026-03-20T23:03:42Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#604 · ADR 0009\n\n## What to build\n(Brainstorm → implementation when sequenced.) The `PersistentAgent` kind (role as label), its reconciler (free-floating-vessel residency via VesselRequirement, bounded-restart supervision), and the first **Governor** for one island (plausibly dinghy or flotilla itself): charter-driven, fast-and-loose creds (ADR 0009 v1), memory ref backed by fs or a hub git repo, wakes itself for duties like upstream watching.\n\nBlocked conceptually by requirements/resolver v1 (ADR 0007) for the residency requirement — or can start with the seeded-policy equivalent if pulled forward by dogfooding.\n\n## Acceptance criteria\n- [ ] PersistentAgent kind + reconciler; agent survives daemon/host restart (re-materialised, memory intact)\n- [ ] Governor for one island: maintains issues/docs, watches an upstream, launches a convoy in its own namespace\n- 