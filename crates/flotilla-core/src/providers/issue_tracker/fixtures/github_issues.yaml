}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[],"state":"closed","locked":false,"assignees":[],"milestone":null,"comments":3,"created_at":"2026-07-13T23:13:37Z","updated_at":"2026-07-14T12:53:58Z","closed_at":"2026-07-14T12:53:56Z","assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":null,"active_lock_reason":null,"draft":false,"pull_request":{"url":"https://api.github.com/repos/flotilla-org/flotilla/pulls/720","html_url":"https://github.com/flotilla-org/flotilla/pull/720","diff_url":"https://github.com/flotilla-org/flotilla/pull/720.diff","patch_url":"https://github.com/flotilla-org/flotilla/pull/720.patch","merged_at":"2026-07-14T12:53:56Z"},"body":"Adds `layouts/daily-driver.kdl` — andamento''s daily layout composed with one extra pane running `flotilla pm connect --flotilla-bin $FLOTILLA_BIN` (the git-watcher''s seat, per the #667 design) — and `scripts/run-daily-driver.sh` which builds the andamento plugins, warns when the dev binaries are ad-hoc signed (#689), and execs zellij with the layout.\n\nKept on the flotilla side deliberately: andamento''s own `layouts/andamento.kdl` stays flotilla-free, preserving the git-watcher as the manifest independence proof.\n\nThis is the acceptance rig for #708''s daily-driver checklist.","closed_by":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","