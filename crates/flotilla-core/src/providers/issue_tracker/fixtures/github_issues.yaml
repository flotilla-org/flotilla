er infra or implementation."}],"state":"open","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-06-21T15:01:38Z","updated_at":"2026-07-03T14:05:50Z","closed_at":null,"assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#604\n\n## What to build\nPer ADRs 0003/0004/0006: migrate the remaining observed **resource** providers (CloudAgent, TerminalSession) to contribute observed resources into the ephemeral store, move their dashboard panels onto the **Aggregator**, and **delete** the legacy `ProviderData → correlation → WorkItem → Snapshot` core pipeline. This ends Plane A.\n\nConvoy-view convergence is NOT in this issue — it happens up front in #622. Reference data (PRs/issues) is #623; the old pipeline can only be deleted once #623 covers the linked-data panels.\n\n## Acceptance criteria\n- [ ] CloudAgent + TerminalSession providers contribute observed resources\n- [ ] Their dashboard panels are produced by the Aggregator\n- [ ] Legacy ProviderData→WorkItem→Snapshot pipeline removed\n- [ ] Union-find survives only as an on-demand Aggregator utility, not in the core refresh path\n\n## Blocked by\n- #614\n- #623","closed_by":null,"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/616/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/616/timeline","performed_via_github_app":null,"state_reason":null,"pinned_comment":null},{"url":"https://api.github.co