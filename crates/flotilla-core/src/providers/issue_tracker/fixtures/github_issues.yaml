ased on the agreed design: the enclosing project or archipelago metadata retains its meaning. Normal human `flotilla attach` behavior remains unchanged.\n\n## Tests\n\n- `cargo +nightly-2026-03-12 fmt --check`\n- `cargo clippy --workspace --all-targets --locked -- -D warnings`\n- `cargo test --workspace --locked`\n\nCloses #734\n","closed_by":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/743/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/743/timeline","performed_via_github_app":null,"state_reason":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/734","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/734/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/734/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/734/events","html_url":"https://github.com/flotilla-org/flotilla/issues/734","id":4882310849,"node_id":"I_kwDORel_088AAAABIwImwQ","number":734,"title":"Tables v1 slice 2: independents table","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"},{"id":10393665220,"node_id":"LA_kwDORel_088AAAACa4K-xA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/quick-win","name":"quick-win","color":"2EA44F","default":false,"description":"Small, well-scoped tasks suitable for agent batches"},{"id":10393671168,"node_id":"LA_kwDORel_088AAAACa4LWAA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/ui","name":"ui","color":"C5DEF5","default":false,"description":"UI/UX and rendering"}],"state":"closed","locked":false,"assignees":[],"milestone":null,"comments":0,"created_at":"2026-07-14T10:47:05Z","updated_at":"2026-07-14T17:56:11Z","closed_at":"2026-07-14T17:56:11Z","assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#666 (umbrella) · ADR 0014 (independents = free-floating terminal sessions; CONTEXT.md **Independent**).\n\n## What to build\nRegistry entry + table for the `independents` query: typed columns (name, repo, host, phase, attach capability), pane-granularity attach action (suspend-and-exec baseline; zellij pane upgrade with the #714 identity stamp). Exclusion rule asserted: convoy-bound sessions never appear here.\n\n## Acceptance criteria\n- [ ] Independents tab lists free-floating sessions with truthful attach capability; attach works at pane granularity\n- [ ] A session adopted into a convoy leaves the table (delta, no refresh)\n- [ ] One registry entry, no widget changes\n\n## Blocked by\n- #733 (foundation) · #731 (rename — coordinate; whichever lands second rebases spellings)","closed_by":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/734/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/734/timeline","performed_via_github_app":null,"state_reason":"completed","pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/728","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/728/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/728/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/728/events","html_url":"https://github.com/flotilla-org/flotilla/issues/728","id":4882122954,"node_id":"I_kwDORel_088AAAABIv9Iyg","number":728,"title":"Repository resource + flotilla project add (degenerate whole-repo projects)","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"}],"state":"closed","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-07-14T10:20:37Z","updated_at":"2026-07-14T14:52:41Z","closed_at":"2026-07-14T14:52:41Z","assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#629 · Story A of the M1 user-story grill (2026-07-14) → ADR 0014 (PR #727), \"Scope keys are mortal\" section, as amended by the #728 design grill.\n\n## Domain decisions\n- **Repository** is a convergent-facts resource: machine-independent source identity, not Project and not Checkout.\n- **Forge** is the portable external service + repository scope for change requests and default issues. It is not a local provider or credential selection.\n- A **Project** is a definitions-class work context over one or more Repository refs. It may carry one Project-wide `issue_source` override (for example Linear); absent that, issue queries use constituent Repositories'' Forges.\n- There is no \"tracker binding\" abstraction.\n- Repository keys are mortal: `moved` pointers + referent repair remain committed direction per ADR 0014, but the repair mechanism is out of scope here.\n\n## Repository resource\n\n### Identity and declaration\n- Introduce a typed, storage-safe `RepositoryKey` derived from canonical identity. Every key lookup verifies the fetched referent''s identity rather than trusting the digest alone.\n- Remote-backed natural identity is the normalized canonical remote.\n- Remote-less identity is stable Host resource identity + normalized absolute Git common directory, so multiple worktrees of one local repository converge.\n- Resolve machine-local SSH aliases through an injected host-configuration resolver (initially `ssh -G`-backed). An unresolved alias is \"unrecognised remote\"; never mint a globally meaningful key from the alias.\n- With multiple distinct remotes: explicit `--remote` wins; otherwise use unambiguous default-branch evidence or the sole normalized identity; divergent candidates fail visibly. Fork and upstream remain distinct Repository resources.\n- Repository declaration contains immutable canonical identity and derived `forge` identity only. Human issue-source and branch choices belong to Project.\n- Repository persists when it has no Checkout. Last-checkout disappearance empties status; it never deletes the Repository.\n\n### Observations and status\n- All Checkout variants carry typed `repo_ref: RepositoryKey`; `CloneSpec` gains the same association while retaining its transport URL.\n- `ObservedCheckoutSpec` also carries explicit typed `host_ref`; host is never reconstructed from a path, resource name, or replica provenance.\n- Keep repository-key labels only as indexes, not as the authoritative relationship.\n- A dedicated projection derives Repository status from Checkout resources. Status groups Checkout resource refs by Host and includes all authorities/types: observed, adopted, managed worktrees, and transient fresh clones.\n- Default branch is optional and observation-derived, not guessed or copied into Project. Preserve provenance and resolve automatically in this order: Forge metadata, remote symbolic HEAD, unambiguous conventional local trunk, unknown. Disagreement is diagnostic, not a definitions conflict.\n\n## Project shape\n- `ProjectSpec.display_name` and `ProjectSpec.default_workflow_ref` are required concrete persisted values. Admission may default them, but the stored definition never depends on a reader''s current defaults.\n- `ProjectSpec.issue_source` is an optional single Project-wide external issue source. Without it, each constituent Repository''s Forge supplies issues. No configured source is explicit unavailability, not an empty issue list.\n- `ProjectRepositorySpec.repo` is a typed RepositoryKey.\n- Omitted `subpath` means whole repository. Supplied subpaths are normalized, non-empty, repository-relative, and reject absolute/`..` traversal.\n- Omitted `default_branch` means inherit Repository''s resolved default; the field is only a deliberate Project override.\n- Repository entries are semantically unordered: normalize and sort by RepositoryKey + subpath and reject duplicates.\n- Generic resource storage tolerates temporarily unresolved refs (definitions may replicate out of order). Aggregator views and convoy admission derive readiness locally. The `project add` workflow itself ensures its Repository and stock WorkflowTemplate before persisting Project.\n\n## CLI\nReplace the old raw-URL single-repo create form (no compatibility shim):\n\n```\nflotilla project add <path-or-slug> [--name <name>] [--display-name <name>] [--remote <name-or-url>]\nflotilla project apply <name> --file <spec.yaml>\n```\n\n`project add`:\n1. Resolves both path and catalog-slug interpretations through injected collaborators. One match wins; the same identity from both wins; divergent matches fail with both candidates. Absolute paths and qualified slugs disambiguate.\n2. Accepts an untracked local checkout; no preliminary Plane-A `repo add` is required. A path contributes the local Checkout observation. A slug may select any Repository in the replicated catalog, even with no local checkout.\n3. Defaults Project name and display name to the repository leaf slug; explicit overrides are allowed. Name collisions with a different definition fail loudly, never suffix or overwrite.\n4. Preflights inputs/name, ensures Repository, ensures local Checkout observation when applicable, then creates Project last. The flow is ordered and retry-safe, not transactional; truthful Repository/Checkout facts are not rolled back if Project creation fails.\n5. Re-adding an existing same-name whole-repository Project confirms it without mutation—even if its display name, workflow, or issue source evolved. Contradictory explicit flags fail and direct the caller to apply/edit.\n6. Uses one injected Repository inspection/registry boundary shared with Checkout observation reconciliation. Protocol/resource shapes do not encode Plane-A tracking.\n\n## Stock workflow\n`default_workflow_ref` initially captures the ordinary definitions-class WorkflowTemplate `single-agent-contained`. It must be real, not named confinement: #737 owns vessel-level stance enforcement and create-if-absent seeding. Startup never overwrites an existing replicated template. Governors may later create/refine WorkflowTemplates and explicitly update the Project default.\n\n## Acceptance criteria\n- [ ] Adding an untracked local checkout creates/ensures Repository + Checkout observation + whole-repository Project visible in the store\n- [ ] Adding a catalog slug works without a local checkout\n- [ ] Repeating the same add is idempotent and does not reset evolved Project definition fields\n- [ ] Concurrent create-if-absent of the same canonical identity converges; fetched identity is verified\n- [ ] SSH aliases resolve to machine-independent identity or fail as unrecognised; unknown aliases never become keys\n- [ ] Remote-less worktrees sharing a Git common directory resolve to one Host-qualified Repository\n- [ ] Every Checkout variant has a real typed Repository ref and Repository status is derived/grouped by Host\n- [ ] Default-branch observations preserve provenance and resolve by the fixed authority order; unknown is omitted\n- [ ] Project refs resolve locally when dependencies are present; unresolved replicated refs surface derived readiness/admission errors\n- [ ] Project display/default-workflow fields persist concrete defaults and whole-repo subpath is omitted\n- [ ] Behavior tests run through injected inspectors/resolvers/registry collaborators; no live Forge or host sandbox dependency\n\n## Explicitly out\n- Repository `moved` pointer and referent-repair mechanism\n- Definitions-class replication/field-merge machinery\n- Governor creation or workflow refinement\n- Multiple simultaneous Project issue-source overrides\n- Repository-entry roles/order (primary, dependency fork, fixture, sample dependent)\n\n## Blocked by\n- #737 (truthful `single-agent-contained` WorkflowTemplate)","closed_by":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"reactions":{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/728/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"timeline_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/728/timeline","performed_via_github_app":null,"state_reason":"completed","pinned_comment":null},{"url":"https://api.github.com/repos/flotilla-org/flotilla/issues/737","repository_url":"https://api.github.com/repos/flotilla-org/flotilla","labels_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/737/labels{/name}","comments_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/737/comments","events_url":"https://api.github.com/repos/flotilla-org/flotilla/issues/737/events","html_url":"https://github.com/flotilla-org/flotilla/issues/737","id":4882814340,"node_id":"I_kwDORel_088AAAABIwnVhA","number":737,"title":"Enforce vessel stance and seed the stock single-agent contained workflow","user":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"labels":[{"id":10346444324,"node_id":"LA_kwDORel_088AAAACaLI2JA","url":"https://api.github.com/repos/flotilla-org/flotilla/labels/enhancement","name":"enhancement","color":"a2eeef","default":true,"description":"New feature or request"}],"state":"closed","locked":false,"assignees":[],"milestone":null,"comments":1,"created_at":"2026-07-14T11:59:00Z","updated_at":"2026-07-14T14:52:24Z","closed_at":"2026-07-14T14:52:24Z","assignee":null,"author_association":"MEMBER","issue_field_values":[],"type":{"id":32015452,"node_id":"IT_kwDOEBMoCM4B6IRc","name":"Task","description":"A specific piece of work","color":"yellow","created_at":"2026-03-20T09:49:51Z","updated_at":"2026-03-20T09:49:51Z","is_enabled":true},"active_lock_reason":null,"sub_issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\nADR 0010 (crew provisioning, vessel-level stance) · prerequisite extracted from #728''s stock contained-workflow default during the 2026-07-14 #728 design grill.\n\n## Why this is separate\nA WorkflowTemplate name cannot create a security boundary. Today `VesselRequirement` cannot declare ADR 0010''s stance and placement cannot reject an environment×harness pair that fails to realise `contained`. Seeding a template called contained before that enforcement exists would be a silent downgrade.\n\n## What to build\n- Add the closed v1 `Stance` vocabulary (`trusted`, `workspace-write`, `contained`) to `VesselRequirement`.\n- Make placement resolve the requested stance against environment and harness capabilities, walls-first. Harness flags are fallback only.\n- Fail loudly when the requested floor cannot be realised; extra confinement is allowed and recorded as effective stance.\n- Surface requested/effective stance in Vessel/Crew status for queries and diagnostics.\n- Once enforcement exists, seed an ordinary definitions-class WorkflowTemplate named `single-agent-contained`: one VesselRequirement, `contained` stance, one agent crew member selected by `capability: code`.\n- Seed create-if-absent and never overwrite an existing replicated definition. No hard-coded second workflow mechanism.\n\nHost-direct may honestly report that it cannot realise `contained` until a wrapper sandbox exists; it must not silently run trusted. A capable container environment may satisfy it now.\n\n## Acceptance criteria\n- [ ] WorkflowTemplate round-trip/validation covers all three stance values\n- [ ] A contained requirement selects only a placement that can realise the floor\n- [ ] Under-realisation fails visibly before crew launch; no silent downgrade\n- [ ] Effective stance is recorded and queryable\n- [ ] `single-agent-contained` is seeded only after enforcement is active and is runnable on a capable placement\n- [ ] Restart seeding preserves an existing template definition\n- [ ] Behavior tests use injected placement/harness capabilities; no host sandbox dependency\n\n## Unblocks\n- #728 (Project.default_workflow_ref needs a truthful stock contained workflow)\n- #732 (start-from-issue must launch a genuinely contained crew)\n\n## Blocked by\nNone.","closed_by":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.github.com/users/rjwittams/repos","events_url":"https://api.github.com/users/rjwittams/events{/privacy}","received_events_url":"https://api.github.com/users/rjwittams/received_events","type":"User","user_view_type":"public","site_admin":false},"reactions":{"url":"https://api.github.com/repos/fl