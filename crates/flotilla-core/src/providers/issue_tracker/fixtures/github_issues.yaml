issues_summary":{"total":0,"completed":0,"percent_completed":0},"issue_dependencies_summary":{"blocked_by":0,"total_blocked_by":0,"blocking":0,"total_blocking":0},"body":"## Parent\n#604 · Naming ruling from the 2026-07-14 grill → ADR 0014 (PR #727), CONTEXT.md **Independent**.\n\n## What to build\nMechanical rename sweep: `QueryId::Sessions` → `QueryId::Independents`, `SessionRow` → `IndependentRow`, `SessionPhase` → `IndependentPhase` (or keep phase naming if it reads better — phases describe the terminal session), plus CLI/view-address spellings (`sessions` → `independents`). The underlying resource kind stays `TerminalSession` — the rename is at the query/view layer only, where \"session\" is maximally overloaded. No compat shims (no-compat phase). Exclusion rule is unchanged and worth asserting in a test: convoy-bound sessions appear on vessel rows, never in `independents`.\n\n## Acceptance criteria\n- [ ] No `sessions` spelling remains at the query/view/CLI layer; `TerminalSession` resource untouched\n- [ ] Snapshot tests reviewed (headers/addresses change), not blind-accepted\n- [ ] Double-listing exclusion covered by a test\n\n## Blocked by\nNone — can start immediately. Coordinate with #729 (touches QueryId) to avoid churn: whichever lands second rebases.","closed_by":{"login":"rjwittams","id":752137,"node_id":"MDQ6VXNlcjc1MjEzNw==","avatar_url":"https://avatars.githubusercontent.com/u/752137?v=4","gravatar_id":"","url":"https://api.github.com/users/rjwittams","html_url":"https://github.com/rjwittams","followers_url":"https://api.github.com/users/rjwittams/followers","following_url":"https://api.github.com/users/rjwittams/following{/other_user}","gists_url":"https://api.github.com/users/rjwittams/gists{/gist_id}","starred_url":"https://api.github.com/users/rjwittams/starred{/owner}{/repo}","subscriptions_url":"https://api.github.com/users/rjwittams/subscriptions","organizations_url":"https://api.github.com/users/rjwittams/orgs","repos_url":"https://api.gith