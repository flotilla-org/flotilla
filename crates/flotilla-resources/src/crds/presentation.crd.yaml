apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: presentations.flotilla.work
spec:
  group: flotilla.work
  scope: Namespaced
  names:
    plural: presentations
    singular: presentation
    kind: Presentation
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Convoy
          type: string
          jsonPath: .spec.convoy_ref
        - name: Policy
          type: string
          jsonPath: .spec.presentation_policy_ref
        - name: Phase
          type: string
          jsonPath: .status.phase
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
