# Override: use pre-built binary from host instead of cargo build.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# Note: the host binary must be glibc-compatible with Debian bookworm (glibc 2.36).
# If your host has a newer glibc (e.g. Arch, Fedora), build statically:
#   cargo build --release --target x86_64-unknown-linux-musl
# and update the COPY path in Dockerfile accordingly, or use the full target instead.
services:
  node-a:
    build:
      target: dev
  node-b:
    build:
      target: dev
